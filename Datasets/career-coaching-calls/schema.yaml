# Career Coaching Hotline Call Logs Schema

## Database: data.duckdb

### Table: calls
Call log with career stage assessment and topic tracking.

| Column | Type | Description | Example |
|--------|------|-------------|---------|
| id | VARCHAR | Unique call identifier (PK) | `call_abc123` |
| started_at | TIMESTAMP | Call start time (UTC) | `2026-02-14 15:30:00` |
| ended_at | TIMESTAMP | Call end time (UTC) | `2026-02-14 15:45:00` |
| duration_seconds | INTEGER | Call duration in seconds | `900` |
| caller_phone | VARCHAR | Caller phone (for profile matching) | `+15551234567` |
| caller_profile_id | VARCHAR | FK to caller_profiles if matched | `prof_xyz789` |
| topics_discussed | TEXT | Comma-separated topic categories | `resume-customization,ats-optimization` |
| career_stage_assessed | VARCHAR | Career stage from diagnostic | `Materials (Active Preparation)` |
| escalation_requested | BOOLEAN | Whether caller requested Careerspan session | `false` |
| raw_data | JSON | Full VAPI webhook payload for analysis | `{"message": {...}}` |

**Career Stages (from diagnostic):**
- `Groundwork (Pre-Search)` — Pre-search self-reflection phase
- `Materials (Active Preparation)` — Resume/materials building phase
- `Outreach (Active Search)` — Networking and job search phase
- `Performance (Interview & Conversion)` — Interview prep and offer negotiation
- `Transition (Career Change or Crisis)` — Career change, layoff, industry switch

**Topic Categories:**
- `self-reflection`, `groundwork`, `anecdote-development`
- `resume-customization`, `aiss-bullets`, `ats-optimization`, `cover-letters`, `master-resume`, `materials-prep`
- `networking`, `cold-outreach`, `linkedin-strategy`, `systematic-job-hunting`, `four-levers`
- `interview-prep`, `art-of-the-brag`, `start-format`
- `career-change`, `reframing-experience`, `layoff-recovery`
- `career-decision`, `salary-negotiation`
- `escalation`, `general`

### Table: escalations
Careerspan session escalation requests requiring follow-up.

| Column | Type | Description | Example |
|--------|------|-------------|---------|
| id | VARCHAR | Unique escalation identifier (PK) | `esc_xyz789` |
| call_id | VARCHAR | Associated call ID | `call_abc123` |
| name | VARCHAR | Caller's name for follow-up | `Sarah Chen` |
| contact | VARCHAR | Email or phone for booking | `sarah@example.com` |
| career_stage | VARCHAR | Caller's career stage at escalation | `Outreach (Active Search)` |
| reason | TEXT | Why they want a Careerspan session | `Needs help with networking strategy` |
| booking_link_sent | BOOLEAN | Whether Careerspan booking link was sent | `true` |
| created_at | TIMESTAMP | When escalation was logged | `2026-02-14 15:40:00` |

**Privacy Note:** Contains contact info with explicit caller consent for Careerspan follow-up only.

### Table: feedback
Post-call satisfaction feedback from callers.

| Column | Type | Description | Example |
|--------|------|-------------|---------|
| id | VARCHAR | Unique feedback identifier (PK) | `fb_abc123` |
| call_id | VARCHAR | Associated call ID | `call_abc123` |
| caller_name | VARCHAR | Caller's first name (optional) | `Sarah` |
| satisfaction | INTEGER | 1-5 satisfaction rating | `4` |
| comment | TEXT | Optional free-text feedback | `Great advice on my resume!` |
| created_at | TIMESTAMP | When feedback was recorded | `2026-02-14 16:00:00` |

### Table: daily_analysis
Daily LLM-generated analysis of call patterns, career stage trends, and Careerspan conversions.

| Column | Type | Description | Example |
|--------|------|-------------|---------|
| id | VARCHAR | Unique analysis identifier (PK) | `da_20260214` |
| analysis_date | DATE | Date covered by this analysis | `2026-02-14` |
| period_start | TIMESTAMP | Start of analysis window | `2026-02-13 00:00:00` |
| period_end | TIMESTAMP | End of analysis window | `2026-02-14 00:00:00` |
| total_calls | INTEGER | Total calls in period | `12` |
| substantive_calls | INTEGER | Calls >2 min | `7` |
| dropoff_calls | INTEGER | Calls <1 min | `3` |
| avg_duration | DOUBLE | Average call duration (seconds) | `285.5` |
| avg_satisfaction | DOUBLE | Average satisfaction rating | `4.3` |
| career_stages_json | JSON | Distribution of career stages | `{"Materials": 4, "Outreach": 3}` |
| topics_json | JSON | Topic frequency breakdown | `{"resume-customization": 5}` |
| careerspan_conversions | INTEGER | Escalations to Careerspan sessions | `2` |
| patterns_json | JSON | LLM-extracted conversation patterns | `{"common_questions": [...]}` |
| improvements_json | JSON | LLM-recommended improvements | `[{"rank": 1, ...}]` |
| created_at | TIMESTAMP | When analysis was generated (auto) | `2026-02-14 18:00:00` |

**Generated by:** `call_analysis_loop.py` running daily via scheduled agent.

### Table: caller_profiles
Caller profiles from Fillout intake form. Created before or during calls.

| Column | Type | Description | Example |
|--------|------|-------------|---------|
| id | VARCHAR | Unique profile identifier (PK) | `prof_xyz789` |
| name | VARCHAR | Caller's full name (NOT NULL) | `Sarah Chen` |
| phone | VARCHAR | Phone number (NOT NULL) | `+15551234567` |
| email | VARCHAR | Email address | `sarah@example.com` |
| linkedin_url | VARCHAR | LinkedIn profile URL | `https://linkedin.com/in/sarahchen` |
| career_stage | VARCHAR | Self-reported career stage | `Outreach (Active Search)` |
| help_topic | TEXT | What they want help with | `Resume review and networking` |
| resume_text | TEXT | Extracted resume content | `Sarah Chen, Product Manager...` |
| caller_brief | TEXT | LLM-generated coaching brief | `Mid-career PM transitioning...` |
| source | VARCHAR | How they found the hotline | `linkedin_post` |
| created_at | TIMESTAMP | When profile was created (auto) | `2026-02-14 10:00:00` |
| last_call_at | TIMESTAMP | Most recent call timestamp | `2026-02-14 15:30:00` |
| call_count | INTEGER | Total calls from this caller (auto 0) | `3` |

**Index:** `idx_caller_phone` on `phone` column for fast lookup during calls.

### Table: caller_insights
Merged intelligence from calls, feedback, and profiles for returning callers.

| Column | Type | Description | Example |
|--------|------|-------------|---------|
| id | VARCHAR | Unique insight record ID (PK) | `ci_abc123` |
| first_name | VARCHAR | Caller's first name | `Sarah` |
| phone | VARCHAR | Phone number for matching | `+15551234567` |
| topics_discussed | TEXT | Deduplicated topics across all calls | `resume-customization, networking` |
| career_stage | VARCHAR | Most recent career stage assessment | `Outreach (Active Search)` |
| total_calls | INTEGER | Total calls from this caller (auto 0) | `3` |
| avg_satisfaction | DOUBLE | Running average satisfaction | `4.3` |
| first_call_at | TIMESTAMP | First call timestamp | `2026-02-14 15:00:00` |
| last_call_at | TIMESTAMP | Most recent call timestamp | `2026-02-15 14:30:00` |
| updated_at | TIMESTAMP | Last update timestamp (auto) | `2026-02-15 14:30:00` |

**Index:** `idx_insights_phone` on `phone` column.

## Indexes

| Index | Table | Column(s) | Purpose |
|-------|-------|-----------|---------|
| idx_caller_phone | caller_profiles | phone | Fast phone lookup during calls |
| idx_calls_started | calls | started_at | Time-range queries for analysis |
| idx_calls_career_stage | calls | career_stage_assessed | Stage distribution queries |
| idx_escalations_call | escalations | call_id | Join escalations to calls |
| idx_feedback_call | feedback | call_id | Join feedback to calls |
| idx_daily_analysis_date | daily_analysis | analysis_date | Analysis lookups by date |
| idx_insights_phone | caller_insights | phone | Fast returning-caller lookup |

## Usage Patterns

### Analytics Queries
```sql
-- Call volume by day
SELECT DATE(started_at) as call_date, COUNT(*) as calls
FROM calls
WHERE started_at > '2026-01-01'
GROUP BY DATE(started_at)
ORDER BY call_date;

-- Career stage distribution
SELECT career_stage_assessed, COUNT(*) as count
FROM calls
WHERE career_stage_assessed IS NOT NULL
GROUP BY career_stage_assessed
ORDER BY count DESC;

-- Most discussed topics
SELECT topics_discussed, COUNT(*) as frequency
FROM calls
WHERE topics_discussed IS NOT NULL
GROUP BY topics_discussed
ORDER BY frequency DESC;

-- Careerspan conversion rate
SELECT
  COUNT(*) as total_calls,
  COUNT(CASE WHEN escalation_requested THEN 1 END) as escalations,
  ROUND(COUNT(CASE WHEN escalation_requested THEN 1 END) * 100.0 / COUNT(*), 1) as conversion_pct
FROM calls;

-- Career stage × escalation rate
SELECT
  career_stage_assessed,
  COUNT(*) as calls,
  COUNT(CASE WHEN escalation_requested THEN 1 END) as escalations,
  ROUND(COUNT(CASE WHEN escalation_requested THEN 1 END) * 100.0 / COUNT(*), 1) as esc_rate
FROM calls
WHERE career_stage_assessed IS NOT NULL
GROUP BY career_stage_assessed
ORDER BY esc_rate DESC;
```

### Daily Analysis Queries
```sql
-- Satisfaction trend over time
SELECT analysis_date, avg_satisfaction, total_calls, careerspan_conversions
FROM daily_analysis
ORDER BY analysis_date DESC
LIMIT 14;

-- Career stage trends over time
SELECT analysis_date, career_stages_json
FROM daily_analysis
ORDER BY analysis_date DESC
LIMIT 7;

-- Returning callers ranked by engagement
SELECT first_name, total_calls, avg_satisfaction, topics_discussed, career_stage
FROM caller_insights
ORDER BY total_calls DESC;
```

### Operational Queries
```sql
-- Recent escalations for follow-up
SELECT name, contact, career_stage, reason, booking_link_sent, created_at
FROM escalations
ORDER BY created_at DESC
LIMIT 10;

-- Callers who filled out intake but haven't called
SELECT name, career_stage, help_topic, created_at
FROM caller_profiles
WHERE call_count = 0
ORDER BY created_at DESC;

-- Average call duration by career stage
SELECT
  career_stage_assessed,
  COUNT(*) as calls,
  AVG(duration_seconds) as avg_duration,
  MAX(duration_seconds) as max_duration
FROM calls
WHERE career_stage_assessed IS NOT NULL
GROUP BY career_stage_assessed
ORDER BY avg_duration DESC;
```

## Data Flow

1. Caller fills out Fillout intake form → `caller_profiles` created via webhook
2. VAPI call starts → phone matched to `caller_profiles` if exists
3. During call: diagnostic assesses career stage, knowledge base topics discussed
4. Escalation tool call → creates `escalations` record with Careerspan booking
5. End-of-call → final `calls` record with duration, stage, topics, raw data
6. Feedback tool call → creates `feedback` record + updates `caller_insights`
7. Daily scheduled agent runs `call_analysis_loop.py` → writes `daily_analysis`
8. Analysis loop merges feedback + call data → updates `caller_insights`

## Access Patterns

### Read Access
- **V**: Full access for Careerspan follow-up and coaching analytics
- **System**: Webhook utilities for health checks and reporting
- **Analysis Loop**: Read calls/feedback → write daily_analysis + caller_insights

### Write Access
- **Fillout Webhook**: Creates caller_profiles from intake form
- **VAPI Webhook**: Writes calls, escalations, feedback, updates caller_insights
- **Analysis Loop**: Writes daily_analysis, updates caller_insights
