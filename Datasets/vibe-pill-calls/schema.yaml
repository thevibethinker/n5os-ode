## Example Queries

### Membership Funnel
```sql
-- Application conversion rate
SELECT
  status,
  COUNT(*) as count,
  ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER(), 1) as pct
FROM applications
GROUP BY status;

-- Average time to decision
SELECT
  AVG(EXTRACT(EPOCH FROM (resolved_at - created_at)) / 3600) as avg_hours_to_decision
FROM applications
WHERE resolved_at IS NOT NULL;
```

### Member Engagement
```sql
-- Most active members
SELECT mp.name, mp.total_calls, mp.tier, mp.last_pathway, mp.last_call_at
FROM member_profiles mp
WHERE mp.status = 'member'
ORDER BY mp.total_calls DESC
LIMIT 10;

-- Calls by pathway
SELECT pathway, COUNT(*) as calls, AVG(duration_seconds) as avg_duration
FROM calls
GROUP BY pathway
ORDER BY calls DESC;

-- Member retention: calls per member over time
SELECT
  DATE_TRUNC('week', started_at) as week,
  COUNT(DISTINCT member_phone) as unique_callers,
  COUNT(*) as total_calls
FROM calls
WHERE member_status = 'member'
GROUP BY DATE_TRUNC('week', started_at)
ORDER BY week;
```

### Call Analytics
```sql
-- Daily call volume
SELECT DATE(started_at) as call_date, COUNT(*) as calls
FROM calls
GROUP BY DATE(started_at)
ORDER BY call_date;

-- Escalation rate by pathway
SELECT
  pathway,
  COUNT(*) as total,
  COUNT(CASE WHEN escalation_requested THEN 1 END) as escalations,
  ROUND(COUNT(CASE WHEN escalation_requested THEN 1 END) * 100.0 / COUNT(*), 1) as esc_rate_pct
FROM calls
GROUP BY pathway;

-- Satisfaction by member tier
SELECT
  mp.tier,
  AVG(f.satisfaction) as avg_satisfaction,
  COUNT(*) as feedback_count
FROM feedback f
JOIN calls c ON f.call_id = c.id
JOIN member_profiles mp ON c.member_phone = mp.phone
GROUP BY mp.tier;
```

### Operational
```sql
-- Recent escalations for V's review
SELECT e.name, e.contact, e.reason, e.created_at, c.pathway
FROM escalations e
LEFT JOIN calls c ON e.call_id = c.id
ORDER BY e.created_at DESC
LIMIT 10;

-- Pending applications
SELECT name, phone, screening_notes, created_at
FROM applications
WHERE status = 'pending'
ORDER BY created_at ASC;
```

## Data Sources

### Primary Input
- **VAPI Webhook**: Real-time call data from Vibe Pill voice assistant
- **Tool Calls**: Screening results, escalations, feedback, member lookups
- **End-of-Call Reports**: Duration, summary, and outcome metadata

### Data Flow
1. VAPI sends webhook events to the Vibe Pill webhook handler
2. Webhook resolves caller identity via member_profiles lookup
3. Call record written to calls table with member context
4. Escalation/feedback tool calls create records in respective tables
5. New callers trigger application flow → applications table
6. Member profile updated on each call (total_calls, last_call_at, etc.)
7. Daily analysis agent runs pattern extraction over calls + feedback

## Access Patterns

### Write Access
- **Webhook handler**: Writes calls, escalations, feedback; updates member_profiles
- **Application handler**: Writes applications, updates member_profiles status
- **Analysis agent**: Writes daily_analysis
- **V (manual)**: May update member_profiles notes, application decisions

### Read Access
- **V**: Full access — escalation follow-up, member management, analytics
- **Webhook handler**: Reads member_profiles for identity resolution
- **Analysis agent**: Reads calls, feedback for pattern extraction
