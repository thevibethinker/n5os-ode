# Vibe Pill Hotline Call Logs Schema

## Database: data.duckdb

### Table: calls
Call records from The Vibe Pill membership hotline. Unlike the Zo Hotline (anonymous), this dataset includes member identity for personalized service.

| Column | Type | Description | Example |
|--------|------|-------------|---------|
| id | VARCHAR | VAPI call ID | `call_abc123` |
| member_phone | VARCHAR | Caller phone in E.164 format | `+18575551234` |
| member_name | VARCHAR | Resolved member name (if known) | `David Chen` |
| member_status | VARCHAR | Member status at call time | `member` |
| started_at | TIMESTAMP | Call start time (UTC) | `2026-02-20 15:30:00` |
| ended_at | TIMESTAMP | Call end time (UTC) | `2026-02-20 15:45:00` |
| duration_seconds | INTEGER | Call duration in seconds | `900` |
| pathway | VARCHAR | Call pathway used | `cobuild` |
| outcome | VARCHAR | Call outcome classification | `qualified` |
| topics_discussed | TEXT | Comma-separated topics | `assessment,cobuild,strategy` |
| summary | TEXT | AI-generated call summary | `Member discussed Q2 hiring plan...` |
| escalation_requested | BOOLEAN | Whether V follow-up needed | `false` |
| raw_data | JSON | Full call metadata | `{"assistant_id": "..."}` |

**Member Status Values:**
- `prospect` — Unknown caller, first contact
- `applicant` — Has submitted an application
- `approved` — Approved but not yet paying
- `member` — Active paying member

**Pathway Values:**
- `intake` — First-time screening/qualification call
- `support` — Existing member support
- `cobuild` — Co-building session (member benefit)
- `faq` — General questions about The Vibe Pill

**Outcome Values:**
- `qualified` — Caller qualified for membership
- `needs-followup` — Requires V's personal follow-up
- `not-fit` — Not a match for membership
- `member-support` — Existing member received support

### Table: member_profiles
Persistent member records with identity resolution and engagement tracking.

| Column | Type | Description | Example |
|--------|------|-------------|---------|
| phone | VARCHAR (PK) | E.164 phone number | `+18575551234` |
| name | VARCHAR | Member name | `David Chen` |
