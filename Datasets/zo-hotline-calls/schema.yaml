# Zo Hotline Call Logs Schema

## Database: data.duckdb

### Table: calls
Anonymous call pattern data - NO PII stored.

| Column | Type | Description | Example |
|--------|------|-------------|---------|
| id | VARCHAR | Unique call identifier | `call_abc123` |
| started_at | TIMESTAMP | Call start time (UTC) | `2026-02-12 15:30:00` |
| ended_at | TIMESTAMP | Call end time (UTC) | `2026-02-12 15:45:00` |
| duration_seconds | INTEGER | Call duration in seconds | `900` |
| topics_discussed | TEXT | Comma-separated topic categories | `assessment,level-2,meta-os` |
| level_assessed | INTEGER | Meta-OS level if assessed (1-3) | `2` |
| escalation_requested | BOOLEAN | Whether caller requested V follow-up | `false` |
| raw_data | JSON | Anonymous metadata for analysis | `{"concepts_explained": ["delay-the-draft"]}` |

**Privacy Protection:**
- NO phone numbers, names, or PII
- Topics are pre-defined categories only
- Raw data contains only anonymous metadata

**Topic Categories:**
- `assessment` - Level diagnostic performed
- `level-1` - Conversation tactics discussed
- `level-2` - Environment setup discussed  
- `level-3` - Pipeline automation discussed
- `meta-os` - Overall framework explanation
- `delay-the-draft` - Specific tactic explanation
- `clarification-gates` - Specific tactic explanation
- `adversarial-probing` - Specific tactic explanation
- `semantic-hunger` - Advanced concept explanation
- `pools-vs-flows` - Advanced concept explanation
- `escalation` - Requested hands-on help
- `general` - General advisory conversation

### Table: escalations
Escalation requests requiring V's personal follow-up.

| Column | Type | Description | Example |
|--------|------|-------------|---------|
| id | VARCHAR | Unique escalation identifier | `esc_xyz789` |
| call_id | VARCHAR | Associated call ID (may be unknown) | `call_abc123` |
| name | VARCHAR | Caller's name for follow-up | `John Smith` |
| contact | VARCHAR | Email or phone for V's follow-up | `john@example.com` |
| reason | TEXT | Why hands-on help is needed | `Wants help building automated reports` |
| created_at | TIMESTAMP | When escalation was logged | `2026-02-12 15:40:00` |

**Privacy Note:** This table contains contact info with explicit caller consent for V's follow-up only.

### Table: feedback
Post-call satisfaction feedback from callers.

| Column | Type | Description | Example |
|--------|------|-------------|---------|
| id | VARCHAR | Unique feedback identifier | `fb_abc123` |
| call_id | VARCHAR | Associated call ID | `call_abc123` |
| caller_name | VARCHAR | Caller's first name (optional) | `David` |
| satisfaction | INTEGER | 1-5 satisfaction rating | `4` |
| comment | TEXT | Optional free-text feedback | `Really helpful!` |
| created_at | TIMESTAMP | When feedback was recorded | `2026-02-14 16:00:00` |

### Table: daily_analysis
Daily LLM-generated analysis of call patterns and trends.

| Column | Type | Description | Example |
|--------|------|-------------|---------|
| id | VARCHAR | Unique analysis identifier | `da_20260214` |
| analysis_date | DATE | Date covered by this analysis | `2026-02-14` |
| period_start | TIMESTAMP | Start of analysis window | `2026-02-13 00:00:00` |
| period_end | TIMESTAMP | End of analysis window | `2026-02-14 00:00:00` |
| total_calls | INTEGER | Total calls in period | `8` |
| substantive_calls | INTEGER | Calls >2 min | `5` |
| dropoff_calls | INTEGER | Calls <1 min | `2` |
| avg_duration | DOUBLE | Average call duration (seconds) | `342.5` |
| avg_satisfaction | DOUBLE | Average satisfaction rating | `4.2` |
| patterns_json | JSON | LLM-extracted conversation patterns | `{"top_topics": [...]}` |
| dropoff_insights_json | JSON | LLM-classified drop-off reasons | `{"categories": [...]}` |
| improvements_json | JSON | LLM-recommended improvements | `[{"area": "greeting", ...}]` |
| created_at | TIMESTAMP | When analysis was generated (DEFAULT CURRENT_TIMESTAMP) | `2026-02-14 18:00:00` |

**Generated by:** `call_analysis_loop.py` running daily at 6pm ET via scheduled agent.

### Table: caller_insights
Returning caller tracking for personalization and trend analysis.

| Column | Type | Description | Example |
|--------|------|-------------|---------|
| id | VARCHAR | Unique insight record ID | `ci_abc123` |
| first_name | VARCHAR | Caller's first name (from feedback) | `David` |
| call_count | INTEGER | Total calls from this caller | `3` |
| first_seen | TIMESTAMP | First call timestamp | `2026-02-12 15:00:00` |
| last_seen | TIMESTAMP | Most recent call timestamp | `2026-02-14 14:30:00` |
| avg_satisfaction | DOUBLE | Running average satisfaction | `4.3` |
| last_satisfaction | INTEGER | Most recent satisfaction rating | `5` |
| topics_history | VARCHAR | Deduplicated topics across all calls | `assessment, level-2, meta-os` |
| level_assessed | INTEGER | Most recent level assessment (1-3) | `2` |
| notes | VARCHAR | Any additional notes | `Repeat caller, advanced user` |

**Privacy Note:** Contains first names only (no phone/email). Populated from voluntary feedback entries.

## Usage Patterns

### Analytics Queries
```sql
-- Call volume by day
SELECT DATE(started_at) as call_date, COUNT(*) as calls
FROM calls 
WHERE started_at > '2026-01-01'
GROUP BY DATE(started_at)
ORDER BY call_date;

-- Most discussed topics  
SELECT topics_discussed, COUNT(*) as frequency
FROM calls 
WHERE topics_discussed IS NOT NULL
GROUP BY topics_discussed
ORDER BY frequency DESC;

-- Assessment level distribution
SELECT level_assessed, COUNT(*) as count
FROM calls
WHERE level_assessed IS NOT NULL
GROUP BY level_assessed
ORDER BY level_assessed;

-- Escalation rate
SELECT 
  COUNT(*) as total_calls,
  COUNT(CASE WHEN escalation_requested THEN 1 END) as escalations,
  ROUND(COUNT(CASE WHEN escalation_requested THEN 1 END) * 100.0 / COUNT(*), 1) as escalation_rate_pct
FROM calls;
```

### Daily Analysis Queries
```sql
-- Satisfaction trend over time
SELECT analysis_date, avg_satisfaction, total_calls, substantive_calls
FROM daily_analysis
ORDER BY analysis_date DESC
LIMIT 14;

-- Drop-off insights for recent period
SELECT analysis_date, dropoff_calls, dropoff_insights_json
FROM daily_analysis
WHERE dropoff_calls > 0
ORDER BY analysis_date DESC
LIMIT 7;

-- Returning callers ranked by engagement
SELECT first_name, call_count, avg_satisfaction, topics_history, last_seen
FROM caller_insights
ORDER BY call_count DESC;

-- Satisfaction feedback with ratings
SELECT f.satisfaction, f.comment, c.topics_discussed, c.duration_seconds
FROM feedback f
JOIN calls c ON f.call_id = c.id
ORDER BY f.created_at DESC;
```

### Operational Queries
```sql
-- Recent escalations for V's review
SELECT name, contact, reason, created_at
FROM escalations
ORDER BY created_at DESC
LIMIT 10;

-- Average call duration by topic
SELECT 
  topics_discussed,
  COUNT(*) as calls,
  AVG(duration_seconds) as avg_duration,
  MAX(duration_seconds) as max_duration
FROM calls
WHERE topics_discussed IS NOT NULL
GROUP BY topics_discussed
ORDER BY avg_duration DESC;
```

## Data Sources

### Primary Input
- **VAPI Webhook**: Real-time call data from voice assistant
- **Tool Calls**: Assessment results, concept requests, escalations
- **End-of-Call Reports**: Duration and summary metadata

### Data Flow
1. VAPI sends webhook events to hotline-webhook.ts
2. Webhook processes tool calls and logs patterns anonymously
3. End-of-call reports trigger final call record creation
4. Escalation tool calls create records in escalations table
5. Feedback tool calls create records in feedback table + update caller_insights
6. Daily 6pm ET scheduled agent runs `call_analysis_loop.py`
7. Analysis loop: queries calls/feedback → LLM pattern extraction → writes daily_analysis
8. Drop-off analyzer: LLM classifies short calls (<1 min) for actionable insights
9. Caller insights: merges topic history and satisfaction trends for returning callers

## Access Patterns

### Read Access
- **V**: Full access for escalation follow-up and analytics
- **System**: Call-logger.ts utilities for health checks and reporting
- **Analytics**: Anonymous pattern analysis for improving advisory quality

### Write Access
- **Webhook**: hotline-webhook.ts writes calls, escalations, feedback, caller_insights
- **Analysis Loop**: call_analysis_loop.py writes daily_analysis and updates caller_insights
- **No Manual Edits**: All data comes through structured interfaces

## Retention Policy

### Calls Table
- **Indefinite retention** for anonymous analytics
- Data has no PII so no privacy concerns with long-term storage
- Useful for identifying popular topics and improving content

### Escalations Table  
- **Review and archive** after V completes follow-up
- Contains PII so should be cleaned periodically
- Consider archiving completed escalations after 90 days