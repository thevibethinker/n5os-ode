<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Excalidraw Viewer</title>

    <link
      rel="stylesheet"
      href="https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/dev/index.css"
    />
    <link rel="stylesheet" href="/excalidraw/viewer.css" />

    <style>
      /* Force dark background on Excalidraw */
      .excalidraw,
      .excalidraw.theme--dark {
        --default-bg-color: #121212 !important;
        --island-bg-color: #232329 !important;
      }
      /* Target the actual canvas wrapper */
      .excalidraw .excalidraw__canvas-wrapper,
      .excalidraw .excalidraw-canvas-wrapper {
        background: #121212 !important;
      }
      /* Fallback: target any canvas container */
      .excalidraw > div:first-child {
        background: #121212 !important;
      }
      /* Nuclear option: invert if nothing else works */
      .viewer-root.force-dark .excalidraw canvas {
        filter: invert(0.93) hue-rotate(180deg);
      }
    </style>

    <script>
      window.EXCALIDRAW_ASSET_PATH =
        "https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/prod/";
    </script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@19.0.0",
          "react/jsx-runtime": "https://esm.sh/react@19.0.0/jsx-runtime",
          "react-dom": "https://esm.sh/react-dom@19.0.0",
          "react-dom/client": "https://esm.sh/react-dom@19.0.0/client"
        }
      }
    </script>
  </head>

  <body>
    <div id="app"></div>

    <script type="module">
      import * as ExcalidrawLib from "https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/dev/index.js?external=react,react-dom,react-dom/client";
      import React from "https://esm.sh/react@19.0.0";
      import * as ReactDOMClient from "https://esm.sh/react-dom@19.0.0/client";

      console.log("[viewer] ExcalidrawLib keys:", Object.keys(ExcalidrawLib));
      console.log("[viewer] THEME:", ExcalidrawLib.THEME);

      let excalidrawApi = null;

      // Use library constant if available, otherwise string
      const DARK_THEME = ExcalidrawLib.THEME?.DARK ?? "dark";

      const DEFAULT_APP_STATE = {
        viewBackgroundColor: "#121212",
        theme: DARK_THEME,
        viewModeEnabled: true,
        zenModeEnabled: true,
        gridSize: null,
      };

      const setLoading = () => {
        const mount = document.getElementById("app");
        if (!mount) return;
        mount.innerHTML =
          '<div style="height:100vh;display:grid;place-items:center;color:#a1a1aa;font-family:ui-sans-serif,system-ui;background:#121212;">Loading canvas…</div>';
      };

      const renderError = (err) => {
        const mount = document.getElementById("app");
        if (!mount) return;
        mount.innerHTML = "";
        const wrap = document.createElement("div");
        wrap.className = "viewer-error";

        const title = document.createElement("div");
        title.className = "viewer-error__title";
        title.textContent = "Could not load canvas";

        const pre = document.createElement("pre");
        pre.className = "viewer-error__details";
        pre.textContent = String(err && err.message ? err.message : err);

        wrap.appendChild(title);
        wrap.appendChild(pre);
        mount.appendChild(wrap);
      };

      const getParams = () => new URLSearchParams(window.location.search);

      const fetchJson = async (url) => {
        const res = await fetch(url, { cache: "no-store" });
        if (!res.ok) {
          const msg = await res.text().catch(() => "");
          throw new Error(`Failed to fetch ${url}: ${res.status} ${msg}`);
        }
        return res.json();
      };

      const resolveInitialData = async () => {
        const params = getParams();
        const sceneUrl = params.get("scene");
        if (sceneUrl) return fetchJson(sceneUrl);

        const id = params.get("id");
        if (!id) return null;

        const gallery = await fetchJson("/excalidraw/gallery.json");
        const item = (gallery.items || []).find((x) => x.id === id);
        if (!item || !item.scene_url) return null;
        return fetchJson(item.scene_url);
      };

      const App = ({ initialData, forceDark }) => {
        const mergedAppState = {
          ...DEFAULT_APP_STATE,
          ...(initialData?.appState || {}),
        };

        const mergedInitialData = {
          elements: initialData?.elements || [],
          appState: mergedAppState,
          files: initialData?.files || {},
          scrollToContent: true,
        };

        console.log("[viewer] Rendering with mergedInitialData:", mergedInitialData);

        return React.createElement(
          "div",
          { className: forceDark ? "viewer-root force-dark" : "viewer-root" },
          React.createElement(ExcalidrawLib.Excalidraw, {
            initialData: mergedInitialData,
            theme: DARK_THEME,
            excalidrawAPI: (api) => {
              excalidrawApi = api;
              console.log("[viewer] excalidrawAPI received");
              // Try multiple times to set background
              const setBg = () => {
                try {
                  api.updateScene({ appState: { viewBackgroundColor: mergedAppState.viewBackgroundColor } });
                  console.log("[viewer] updateScene called with bg:", mergedAppState.viewBackgroundColor);
                } catch (e) {
                  console.error("[viewer] updateScene error:", e);
                }
              };
              setBg();
              setTimeout(setBg, 100);
              setTimeout(setBg, 500);
            },
          })
        );
      };

      const main = async () => {
        setLoading();

        try {
          const mount = document.getElementById("app");
          if (!mount) throw new Error("Missing mount element");

          const root = ReactDOMClient.createRoot(mount);
          const resolved = await resolveInitialData();
          console.log("[viewer] resolveInitialData result:", resolved);

          // Default to force-dark mode (CSS filter) unless explicitly disabled
          const params = getParams();
          const forceDark = params.get("forceDark") !== "0";

          root.render(React.createElement(App, { initialData: resolved, forceDark }));
        } catch (err) {
          console.error("[viewer] Error in main:", err);
          renderError(err);
        }
      };

      main();
    </script>
  </body>
</html>
