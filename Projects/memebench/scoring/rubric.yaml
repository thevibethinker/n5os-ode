# MemeBench Scoring Rubric v1.0
# Each dimension scored 1-5, total possible: 25

dimensions:
  - id: cultural_reference
    name: Cultural Reference Recognition
    weight: 1.0
    description: Does the model identify the referenced cultural artifact(s)?
    levels:
      1: No recognition of source material
      2: Vague awareness something is being referenced
      3: Identifies general domain (e.g., "internet meme" vs "specific meme")
      4: Correctly identifies specific source
      5: Identifies source AND context of how/when it emerged

  - id: irony_detection
    name: Irony Detection
    weight: 1.0
    description: Does the model recognize layers of irony/sincerity?
    levels:
      1: Interprets everything literally
      2: Recognizes basic sarcasm
      3: Identifies primary irony layer
      4: Recognizes multiple irony layers
      5: Correctly identifies post-ironic content OR acknowledges undecidability

  - id: temporal_context
    name: Temporal Context
    weight: 1.0
    description: Does the model understand when this meme is from and why timing matters?
    levels:
      1: No temporal awareness
      2: Vague sense of "old" vs "new"
      3: Correct era identification (e.g., "early 2010s")
      4: Understands why timing matters for meaning
      5: Connects temporal context to format evolution and cultural moment

  - id: sociological_subtext
    name: Sociological Subtext
    weight: 1.0
    description: Does the model understand the underlying social commentary?
    levels:
      1: No subtext recognition
      2: Surface-level theme identification
      3: Identifies underlying social dynamic
      4: Explains why this commentary uses this format
      5: Connects to broader cultural/economic/political forces

  - id: format_appropriateness
    name: Format Appropriateness
    weight: 1.0
    description: Does the model understand why this format was chosen?
    levels:
      1: Cannot identify format
      2: Identifies format but not why it fits
      3: Explains basic format-message connection
      4: Understands format constraints and capabilities
      5: Recognizes when format choice is conventional vs. creative/subversive

scoring:
  method: sum
  min_score: 5
  max_score: 25
  thresholds:
    poor: 5-10
    below_average: 11-14
    average: 15-18
    good: 19-22
    excellent: 23-25

notes:
  - When in doubt, credit appropriate uncertainty over false confidence
  - Partial credit is acceptable (e.g., 2.5 for borderline cases)
  - Different categories may emphasize different dimensions
  - Context provided with question affects expected scores

