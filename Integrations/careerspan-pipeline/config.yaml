# Google Drive Output
google_drive:
  shared_folder_id: "1UVNExCjlCEclCG6x7gj06ChUxP-e9GnM"
  shared_folder_name: "Careerspan Pipeline Outputs"
  shared_folder_link: "https://drive.google.com/drive/folders/1UVNExCjlCEclCG6x7gj06ChUxP-e9GnM"
  template_employer_folder_id: "1QqRfGTcZnBnw9AbRHGzyKNThW6mJ1XrK"
  structure:
