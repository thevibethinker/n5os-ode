recipes:
  external_standard:
    description: "Default for external meetings - balanced coverage"
    always: [B00, B01, B02_B05, B03, B08, B21, B26]
    conditional: [B04, B06, B07, B10, B13, B14, B25, B28, B32, B33]
    total_blocks: 17
    token_budget: "medium"

  external_sales:
    description: "Sales and partnership meetings - focus on commitments and actions"
    always: [B00, B01, B02_B05, B03, B06, B08, B21, B26]
    conditional: [B04, B07, B10, B13, B14, B25, B32, B33]
    total_blocks: 16
    token_budget: "medium"
    notes: "B06 (Business Context) promoted to always for sales context"

  external_investor:
    description: "Investor meetings - strategic focus with minimal fluff"
    always: [B00, B01, B02_B05, B03, B06, B08, B21, B26, B33]
    conditional: [B04, B10, B13, B25, B28, B32]
    total_blocks: 15
    token_budget: "medium-high"
    notes: "B33 (Decision Rationale) always for investor documentation"

  internal_standup:
    description: "Team standups - operational focus, lightweight"
    always: [B00, B40, B41, B42, B45]
    conditional: [B43, B44, B46, B47]
    total_blocks: 9
    token_budget: "low"
    notes: "Streamlined for daily operational rhythm"

  internal_strategy:
    description: "Strategy and planning sessions - comprehensive"
    always: [B00, B40, B41, B42, B45, B47, B48]
    conditional: [B43, B44, B46]
    total_blocks: 10
    token_budget: "medium"
    notes: "Full strategic coverage for leadership"

  internal_retrospective:
    description: "Retrospectives and reviews - reflection-heavy"
    always: [B00, B40, B41, B42, B45, B47]
    conditional: [B43, B44, B46, B48]
    total_blocks: 10
    token_budget: "medium"
    notes: "Focus on learning and improvement"

triggers:
  B07_warm_intro:
    block: B07
    patterns:
      - "intro me to"
      - "introduce me to"
      - "connect me with"
      - "make an introduction"
    via: B00
    description: "Triggers warm introduction block for specific contacts"

  B14_blurb:
    block: B14
    patterns:
      - "draft a blurb"
      - "write a blurb"
      - "blurb about"
      - "create a blurb"
    via: B00
    description: "Triggers blurb drafting for LinkedIn or other uses"

  deferred_intent:
    block: B00
    patterns:
      - "zo take heed"
      - "zo, remember"
      - "zo, follow up on"
      - "zo, note that"
    via: B00
    description: "Captures deferred intents in B00 for later processing"

priority_relevance:
  business:  # Careerspan recruiting revenue, partnerships, product
    high: [B02_B05, B03, B06, B08, B25, B28]
    medium: [B01, B10, B13, B21, B33]
    low: [B04, B07, B14, B26, B32]
    notes: "High blocks directly impact revenue, partnerships, or strategic decisions"

  career:  # Professional growth, reputation, opportunities
    high: [B01, B03, B08, B21, B26]
    medium: [B02_B05, B07, B10, B13, B14, B33]
    low: [B04, B06, B25, B28, B32]
    notes: "High blocks track decisions, relationships, and career-critical content"

  personal:  # Learning, creativity, projects, identity
    high: [B32, B45, B46]
    medium: [B14, B33, B48]
    low: [B01, B03, B04, B08, B13, B21, B26, B40, B41, B42, B47]
    notes: "Learning and team dynamics are primary personal priorities"

  health:  # Physical, mental, energy, longevity
    high: []
    medium: [B45]
    low: []
    notes: "Minimal direct relevance - team dynamics (B45) touches on burnout/morale"

  relationship:  # Family, friends, community, social bonds
    high: []
    medium: []
    low: [B07]
    notes: "Low relevance - B07 (warm intros) occasionally serves relationship building"

metadata:
  total_blocks: 27
  external_blocks: 17
  internal_blocks: 10
  always_blocks_external: 7
  always_blocks_internal: 7
  conditional_blocks_external: 10
  conditional_blocks_internal: 3
  trigger_based_blocks: [B07, B14]
  idea_system_feeds: [B32, B33]

  output_length_guide:
    short: "50-150 words"
    medium: "150-400 words"
    long: "400-800 words"

  version: "1.0"
  last_updated: "2026-02-01"
  maintained_by: "meeting-system-v3 build"
