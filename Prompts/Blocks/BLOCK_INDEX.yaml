      when: conditional
      trigger_conditions: "Next steps discussed or implied"
      avg_output_length: "medium"
      priority_relevance: [business, career]
      triggers_blocks: []
      notes: "Cross-party action synthesis"

    B14:
      name: "Blurbs Requested"
      purpose: "Draft blurbs for LinkedIn, intros, or other uses"
      when: conditional
      trigger_conditions: "Verbal cue via B00: 'draft a blurb', 'write a blurb', 'blurb about'"
      avg_output_length: "short"
      priority_relevance: [business, career]
      triggers_blocks: []
