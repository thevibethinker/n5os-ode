blocks:
  external:
    B00:
      name: "Zo Take Heed"
      purpose: "Extract deferred intents and verbal cues from transcript"
      when: always
      trigger_conditions: null
      avg_output_length: "short"
      priority_relevance: [business, career]
      triggers_blocks: [B07, B14]
      notes: "Scans for patterns like 'intro me to', 'draft a blurb', 'remember'"

    B01:
      name: "Detailed Recap"
      purpose: "Core narrative summary of meeting content and flow"
      when: always
      trigger_conditions: null
      avg_output_length: "medium"
      priority_relevance: [business, career]
      triggers_blocks: []
      notes: "Primary summary block, 2-4 paragraphs"

    B02_B05:
      name: "Commitments & Actions"
      purpose: "Explicit promises made and action items with owners and deadlines"
      when: always
      trigger_conditions: null
      avg_output_length: "medium"
      priority_relevance: [business, career]
      triggers_blocks: []
      notes: "Merged from B02 (sparse) + B05 (comprehensive)"

    B03:
      name: "Decisions"
      purpose: "Key decisions made with rationale and implications"
      when: always
      trigger_conditions: "Any decision reached or agreed upon"
      avg_output_length: "short"
      priority_relevance: [business, career]
      triggers_blocks: []
      notes: "External meeting decisions only"

    B04:
      name: "Open Questions"
      purpose: "Unresolved questions that need follow-up"
      when: conditional
      trigger_conditions: "Questions raised without clear answers"
      avg_output_length: "short"
      priority_relevance: [business, career]
      triggers_blocks: []
      notes: "Captures knowledge gaps"

    B06:
      name: "Business Context"
      purpose: "Company-specific strategic context and positioning"
      when: conditional
      trigger_conditions: "Discussion of business strategy, market positioning, company goals"
      avg_output_length: "medium"
      priority_relevance: [business]
      triggers_blocks: []
      notes: "Careerspan-specific business context"

    B07:
      name: "Warm Introductions"
      purpose: "Draft introduction emails to specific contacts mentioned"
      when: conditional
      trigger_conditions: "Verbal cue via B00: 'intro me to', 'introduce me to', 'connect me with'"
      avg_output_length: "short"
      priority_relevance: [business, career]
      triggers_blocks: []
      notes: "Only triggered via B00 pattern matching"

    B08:
      name: "Stakeholder Intelligence"
      purpose: "Participant insights, communication style, priorities, influence"
