[pytest]
# Pytest configuration for ParentZo-ChildZo E2E tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    e2e_proce: E2E tests for message processing
    slow: Slow-running tests
    flaky: Tests that may need retries

# Output
addopts = 
    -v
    --tb=short
    --strict-markers
    --color=yes
    -p no:warnings
    --maxfail=1

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)8s] %(name)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Test paths
testpaths = tests

# Timeout (optional - requires pytest-timeout)
# timeout = 300

# Coverage (optional - requires pytest-cov)
# addopts = --cov=scripts --cov-report=html --cov-report=term
