# List Type Definitions
# Version: 1.0
# Created: 2025-11-03
# Purpose: Define expected structure for different list types

list_types:
  
  tools:
    description: Software tools, scripts, prompts, workflows
    required_fields:
      - name
      - type
      - description
    optional_fields:
      - url
      - tags
      - location
      - status
      - created
      - updated
    field_types:
      name: string
      type: string  # script, prompt, service, command
      description: string
      url: string
      tags: array[string]
      status: string  # active, archived, deprecated
  
  ideas:
    description: Ideas, concepts, potential projects
    required_fields:
      - title
      - description
    optional_fields:
      - category
      - tags
      - priority
      - status
      - created
    field_types:
      title: string
      description: string
      category: string
      tags: array[string]
      priority: string  # low, medium, high
      status: string  # new, exploring, active, done, dropped
  
  knowledge:
    description: Knowledge entries, learnings, insights
    required_fields:
      - title
      - category
      - content
    optional_fields:
      - tags
      - source
      - created
      - updated
      - related
    field_types:
      title: string
      category: string
      content: string
      tags: array[string]
      source: string
      related: array[string]
  
  contacts:
    description: People, relationships, connections
    required_fields:
      - name
    optional_fields:
      - company
      - role
      - email
      - tags
      - notes
      - last_contact
    field_types:
      name: string
      company: string
      role: string
      email: string
      tags: array[string]
      notes: string

# Validation Rules
validation:
  enforce_required: true
  warn_on_extra_fields: false
  tag_format: lowercase_hyphenated
  slug_format: lowercase_hyphenated
