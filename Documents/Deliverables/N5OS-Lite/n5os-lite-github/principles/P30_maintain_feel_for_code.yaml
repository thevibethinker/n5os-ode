---
id: P30
name: Maintain Feel For Code
category: quality
priority: high
version: "1.0.0"
created: "2025-11-02"

purpose: |
  Stay connected to the shape, quality, and craft of generated code. AI generates fast—you must maintain understanding. If generating thousands of lines without mental exhaustion, you've lost connection.

when_to_apply:
  - AI-assisted code generation
  - Reviewing generated code
  - Multi-file system generation
  - Large refactors
  - Architecture reviews

pattern:
  core_behavior: |
    Read generated code and understand architecture.
    Should feel mentally tired from comprehension effort.
    If you can't explain the code, don't ship it.
    Quiz yourself on architecture—if you can't answer, stop and read until you can.

examples:
  - description: Reading generated function
    good: "Understand logic, additions, patterns, choices. Can explain why dict unpacking, list comprehension used."
    bad: "Glance at code, see it runs, ship it without understanding"
  - description: Architecture awareness check
    good: "Can list main components, draw interaction flow, identify SSOT, enumerate edge cases, predict failure modes"
    bad: "Rely on AI to tell you what's in codebase, can't explain architecture"
  - description: The fatigue test
    good: "Generated 2,000 lines today, feeling mentally exhausted from comprehension"
    bad: "Generated 2,000 lines, feeling energized—not actually understanding"

anti_patterns:
  - symptom: "Accepting AI output blindly without reading"
    fix: "Read every significant piece of generated code, understand the logic"
  - symptom: "Can't explain architecture of system you 'built'"
    fix: "Stop generating. Read existing code until you can draw the architecture"
  - symptom: "Discovering 'features' you didn't know existed"
    fix: "Maintain inventory of what's been built, review regularly"
  - symptom: "Not feeling tired despite high output"
    fix: "Slow down—comprehension should be exhausting, coding is thinking"

related_principles:
  - P28: Plans As Code DNA
  - P15: Complete Before Claiming
  - P31: Own The Planning Process
  - P18: State Verification is Mandatory

changelog:
