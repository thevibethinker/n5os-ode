# Persona Configuration
# Version: 1.0
# Created: 2025-11-03

# Default Behavior
default_persona: operator
auto_load_on_boot: true

# Switching
auto_switchback:
  enabled: true
  delay_seconds: 0
  target: operator

# Persona Locations
persona_directory: .n5os/personas
persona_format: yaml

# Loading Strategy
loading:
  cache_personas: true
  validate_on_load: true
  fail_on_invalid: false

# Per-Persona Overrides
personas:
  operator:
    always_available: true
    can_route_to_any: true
  
  builder:
    auto_switchback_after: true
    load_planning_prompt: recommended
  
  strategist:
    load_thinking_prompt: recommended
  
  architect:
    load_principles: [P1, P8, P36]
  
  debugger:
    load_principles: [P15, P16, P18, P19]
