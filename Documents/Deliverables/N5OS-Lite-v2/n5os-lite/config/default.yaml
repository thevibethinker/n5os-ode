# N5OS Lite Default Configuration
# Version: 1.0
# Created: 2025-11-03

# Workspace Paths
workspace_root: /home/workspace
conversation_workspace_root: /home/.z/workspaces

# System Features
state_tracking:
  enabled: true
  auto_init: true
  update_frequency: moderate  # low, moderate, high

protection_system:
  enabled: true
  check_before_destructive: true
  require_confirmation: true

# List Management
lists:
  validation: strict  # strict, lenient, none
  auto_docgen: true
  backup_on_change: false

# Knowledge Management
knowledge:
  auto_index: true
  cross_reference: true
  deduplicate: true

# Personas
personas:
  default: operator
  auto_switchback: true
  switchback_delay_seconds: 0

# Documentation
documentation:
  auto_generate: true
  include_examples: true
  format: markdown

# Quality
quality:
  enforce_p15: true  # Complete Before Claiming
  require_dry_run_bulk: true
  min_tests_before_deploy: 1
