---
id: P29
name: Focus Plus Parallel
category: operations
priority: medium
version: "1.0.0"
created: "2025-10-26"
related: [P26, P20]

purpose: |
  Maintain one primary focus while running one auxiliary process in parallel. Strategic parallelism, not chaotic multitasking.

when_to_apply:
  - AI can handle parallel tasks
  - Wait time in feedback loops
  - Supporting work during focus tasks

pattern:
  core_behavior: |
    YOU focus on one thing, AI handles one supporting task. Not zero (too slow), not five (too chaotic). One + one = optimal.

examples:
  - description: Focus + parallel workflow
    good: "FOCUS: Writing spec. PARALLEL: AI generating code from previous spec. When spec done, review AI output, iterate"
    bad: "Five AI conversations open, switching between unrelated tasks, context switching destroys flow"

anti_patterns:
  - symptom: "Five parallel AI conversations"
    fix: "Too much chaos. One focus + one parallel only"
  - symptom: "Parallel work requires attention"
    fix: "Defeats the purpose. Parallel must be background-compatible"

changelog:
  - date: "2025-10-26"
    version: "1.0.0"
    changes: "Initial principle from velocity coding talk"
  - date: "2025-11-02"
    version: "1.0.0"
    changes: "Migrated to YAML format from markdown"
