---
id: P37
name: Refactor Pattern
category: workflow
priority: high
version: 1.0
created: 2025-11-02

purpose: |
  Incremental improvement pattern. Preserves working parts while improving structure.

when_to_apply:
  - Core logic sound, implementation messy
  - Behavior correct, organization poor
  - 70%+ code preservable
  - Low regression risk

when_NOT_to_apply:
  - Core logic wrong → Rebuild
  - <50% survives → Rebuild
  - Changing behavior → Not a refactor

rules:
  1. Read before writing
  2. Preserve working parts
  3. One concern at a time
  4. Test after each change
  5. Commit frequently

decision_matrix:
  refactor_when:
    - Core logic sound
    - 70%+ preservable
    - Low regression risk
  
  rebuild_when:
    - Core logic wrong
    - <50% survives
    - Fighting structure constantly

anti_patterns:
  big_bang_refactor: Change everything at once
  scope_creep: While here, also...
  hidden_rebuild: Changing behavior while refactoring
  no_tests: No verification

warning_signs:
  - Wish I could start from scratch
  - Changing >50% of code
  - Fighting structure more than improving

related: P36, P15, P23
