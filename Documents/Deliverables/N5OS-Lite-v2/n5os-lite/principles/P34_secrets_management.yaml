---
id: P34
name: Secrets Management
category: security
priority: critical
version: "1.0.0"
created: "2025-10-26"
related: [P2, P5, P19, P21]

purpose: |
  All API keys, tokens, passwords, credentials MUST be stored in encrypted secrets manager (N5/scripts/n5_secrets.py). Never plaintext files, environment variables (except Zo-managed), or hardcoded.

when_to_apply:
  - Storing API keys
  - Managing service credentials
  - Handling tokens
  - Database passwords

pattern:
  core_behavior: |
    Centralized encrypted storage with audit trail, rotation tracking, single source of truth.

examples:
  - description: Secret access
    good: "secrets = SecretsManager(); api_key = secrets.get('service_key'); logger.info('Used service_key')"
    bad: "API_KEY = 'sk_live_abc123...' (hardcoded) or .env file unencrypted"

anti_patterns:
  - symptom: "Hardcoded secrets in code"
    fix: "Use SecretsManager, never hardcode"
  - symptom: "Logging secret values"
    fix: "Log key name only, never actual value"

changelog:
  - date: "2025-10-26"
    version: "1.0.0"
    changes: "Initial principle from velocity coding talk"
  - date: "2025-11-02"
    version: "1.0.0"
    changes: "Migrated to YAML format from markdown"
