    Sr. Backend Software Engineer
    Pune, India
    
    Who We Are
    Addepar is a global technology and data company that helps investment professionals provide the most informed, precise guidance for their clients. Hundreds of thousands of users have entrusted Addepar to empower smarter investment decisions and better advice over the last decade. With client presence in more than 50 countries, Addepar's platform aggregates portfolio, market and client data for over $8 trillion in assets. Addepar's open platform integrates with more than 100 software, data and services partners to deliver a complete solution for a wide range of firms and use cases.
    
    Applicants must have legal authorization to work in the country where this role is based on the first day of employment. Visa sponsorship is not available for this position.
    
    What You'll Do
    Architect, implement, and maintain engineering solutions to solve complex problems.
    
    Our Values
    - Act Like an Owner: Think and act like an owner. Own outcomes over actions.
    - Build Together: Collaborate to unlock the best solutions. Deliver lasting value.
    - Champion Clients: Exceed client expectations. Our clients' success is our success.
    - Drive Innovation: Be bold and unconstrained in problem solving. Transform the industry.
    - Embrace Learning: Engage our community to broaden our perspective. Bring a growth mindset.
    
    In addition to our core values, Addepar is proud to be an equal opportunity employer. We seek to bring together diverse ideas, experiences, skill sets, perspectives, backgrounds and identities to drive innovative solutions. We commit to promoting a welcoming environment where inclusion and belonging are held.
  
