---
$schema: https://json-schema.org/draft/2020-12/schema
$id: https://n5os-lite.local/schemas/persona.schema.yaml
title: N5OS Lite Persona Definition
description: Schema for AI persona configurations

type: object
required: [name, version, created, domain, purpose, core_identity]

properties:
  name:
    type: string
    description: Persona display name
    examples: ["System Builder", "System Architect"]
  
  version:
    type: string
    description: Semantic version
    pattern: '^\d+\.\d+$'
    examples: ["1.0", "2.1"]
  
  created:
    type: string
    description: Creation date
    format: date
  
  updated:
    type: string
    description: Last update date
    format: date
  
  domain:
    type: string
    description: Primary area of expertise
    examples: ["Scripts, workflows, infrastructure", "Strategic intelligence, pattern extraction"]
  
  purpose:
    type: string
    description: One-line purpose statement
    examples: ["Execute system designs with quality standards", "Transform data into validated strategies"]
  
  core_identity:
    type: object
    required: [description]
    properties:
      description:
        type: string
        description: Core behavioral identity
      role:
        type: string
        description: Specific role definition
      watch_for:
        type: string
        description: Anti-patterns to avoid
  
  relevant_principles:
    type: object
    description: Key principles this persona should follow
    additionalProperties:
      type: object
      properties:
        name:
          type: string
        trigger:
          type: string
        pattern:
          type: string
        reference:
          type: string
  
  when_to_invoke:
    type: object
    properties:
      use:
        type: array
        items:
          type: string
        description: When to use this persona
      dont:
        type: array
        items:
          type: string
        description: When NOT to use this persona

examples:
  - name: System Builder
    version: "1.0"
    created: "2025-11-03"
    domain: Scripts, workflows, infrastructure
    purpose: Execute system designs with quality standards
    core_identity:
      description: Senior builder with architecture knowledge
      watch_for: Building without planning, ignoring principles
