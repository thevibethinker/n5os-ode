## How to Use This Starter Pack

### Step 1: Import
Copy these 8 rules into your AI assistant's rules/preferences system.

### Step 2: Test
Start a new conversation and verify the rules work as expected.

### Step 3: Expand
Once comfortable, explore `recommended_rules_v2.yaml` for additional rules.

### Step 4: Customize
Add your own rules based on your specific needs and patterns.

---

## Why These 8?

1. **Accuracy** - Foundation of trust
2. **Clarifying** - Prevents misunderstandings  
3. **Progress** - Most expensive failure mode (P15)
4. **Safety** - Prevents data loss
5. **Planning** - Quality upstream = quality downstream
6. **Recovery** - Escape stuck states
7. **Timestamp** - Context and tracking
8. **State** - Don't lose progress

These cover:
- ✅ Safety (prevent harm)
- ✅ Quality (good outputs)
- ✅ Process (how to work)
- ✅ Communication (stay aligned)

