## Troubleshooting

**Q: AI not following a rule?**
- A: Rewrite more specifically, test in fresh conversation, check for conflicts

**Q: Too many rules?**
- A: Start here (8), add 1-2 per week based on observed patterns

**Q: Rules conflicting?**
- A: Specific beats general, safety beats speed, user intent beats rules

**Q: How to disable a rule temporarily?**
- A: Say explicitly: "For this task, ignore rule X"

