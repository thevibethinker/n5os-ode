## Usage Instructions

### For New Users

1. **Copy this file** to your workspace as `my_rules.yaml`
2. **Review each rule** - understand what it does
3. **Customize** user-specific rules (rule_1000+)
4. **Remove** any rules that don't fit your workflow
5. **Add** custom rules as needed
6. **Import** to your AI assistant's rules system
7. **Test** in a fresh conversation

### Priority Levels

- **critical**: Never violate (safety, data integrity)
- **high**: Follow unless explicitly overridden
- **medium**: Strong preference, can adjust
- **low**: Suggestion, adapt as needed

### Rule Categories

- **001-099**: Always applied core rules
- **100-199**: Communication & style
- **200-299**: System operations & safety
- **300-399**: Planning & building
- **400-499**: Problem solving & debugging
- **500-599**: File organization
- **600-699**: Quality standards
- **700-799**: Workflow execution
- **800-899**: Persona management
- **900-999**: Special commands
- **1000+**: User-specific customizations

### Modification Guidelines

**DO:**
- Adjust wording to match your style
- Add examples to clarify intent
- Create new rules for repeated patterns
- Version control your rules file
- Document why rules exist

**DON'T:**
- Create contradictory rules
- Make rules too vague
- Skip testing new rules
- Forget to update after changes
- Remove safety rules without replacement

### Testing New Rules

1. Create test scenario
2. Start fresh conversation
3. Trigger the rule condition
4. Verify expected behavior
5. Document any issues
6. Iterate and refine

