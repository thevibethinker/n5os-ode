---
id: P8
name: Minimal Context, Maximal Clarity
category: cognitive_load
priority: medium
version: "1.0.0"
created: "2025-11-03"

purpose: |
  Keep prompts, personas, and workflows self-contained and understandable in isolation. Avoid excessive cross-references that create cognitive overload.

when_to_apply:
  - Designing personas or prompts
  - Loading context before work
  - Building workflows
  - Creating documentation
  - Defining system boundaries

pattern:
  core_behavior: |
    Each component should be comprehensible on its own.
    Load only the context needed for precision—not everything related.
    Avoid creating webs of dependencies that require loading 10 files to understand one thing.
    Self-contained > highly coupled.

examples:
  - description: Persona design
    good: "Persona includes core methods, anti-patterns, and when to invoke—readable alone"
    bad: "Persona references 8 other files that must be loaded to understand it"
  
  - description: Loading context for analysis
    good: "Load 2-3 specific files directly relevant to the task"
    bad: "Load entire N5 knowledge base 'just in case'"

anti_patterns:
  - symptom: "Cannot understand component without loading many dependencies"
    fix: "Inline essential information, link to details for deep dives"
  
  - symptom: "Context loading becomes ritual rather than purposeful"
    fix: "Question each load: 'Will this change my approach?' If no, skip it"

related_principles:
  - P1: Human-Readable First
  - P2: Single Source of Truth
  - P20: Modular Design

changelog:
  - date: "2025-11-03"
    version: "1.0.0"
    changes: "Extracted for N5OS Lite"
