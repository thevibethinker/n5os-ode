---
id: P23
name: Identify Trap Doors
category: strategy
priority: critical
version: "1.0.0"
created: "2025-11-03"

purpose: |
  Explicitly identify and document irreversible or high-cost decisions before committing. Recognize trap doors, evaluate alternatives, choose deliberately.

when_to_apply:
  - System architecture decisions
  - Data format selection
  - Technology stack choices
  - API design
  - Schema design
  - Framework selection

pattern:
  core_behavior: |
    A trap door is a decision where choosing one path makes it expensive or impossible to reverse.
    Recognize these moments, document alternatives considered, make choices deliberately—not accidentally.
    
    Document:
    - What is the trap door?
    - What are the options?
    - What makes this irreversible?
    - What is the choice and why?
    - Cost to reverse if wrong?

examples:
  - description: Data format trap door
    good: "TRAP DOOR: Storage format. Options: JSONL vs SQLite. Choosing JSONL for simplicity. Reversible via migration (~8 hours)."
    bad: "Just use JSONL without recognizing it's a trap door"
  
  - description: Framework choice
    good: "TRAP DOOR: Web framework. Flask (simple) vs FastAPI (modern). Choosing Flask. Migration would require rewriting route handlers (~20 hours)."
    bad: "Flask works, use it without considering switching cost"

anti_patterns:
  - symptom: "Choosing technology casually without thinking about reversal cost"
    fix: "Ask: If this choice is wrong, what does it take to change it?"
  
  - symptom: "Discovering months later that choice was wrong and costly to fix"
    fix: "Identify trap doors during planning phase, not during crisis"

related_principles:
  - P27: Nemawashi (explore alternatives)
  - P24: Simulation Over Doing
  - P31: Own The Planning Process

changelog:
  - date: "2025-11-03"
    version: "1.0.0"
