---
id: P5
name: Safety, Determinism, and Anti-Overwrite
category: reliability
priority: high
version: "1.0.0"
created: "2025-11-03"

purpose: |
  Prevent data loss through safe file operations, predictable behavior, and explicit confirmation before destructive changes.

when_to_apply:
  - Writing or modifying files
  - Destructive operations (delete, move, overwrite)
  - Batch file operations
  - Automated workflows
  - Any operation that cannot be easily undone

pattern:
  core_behavior: |
    Never overwrite files without explicit confirmation or auto-versioning.
    On naming conflicts, create versioned files (_v2, _v3) rather than replacing.
    Maintain rolling backups and audit logs for critical operations.
    Prefer dry-run mode for previewing destructive changes.

examples:
  - description: Saving a file that already exists
    good: "Create report_v2.md instead of overwriting report.md"
    bad: "Silently overwrite report.md with new content"
  
  - description: Batch file moves
    good: "Show dry-run preview of 47 files to be moved, ask for confirmation"
    bad: "Move files immediately without showing what will change"

anti_patterns:
  - symptom: "Files mysteriously disappear or get overwritten"
    fix: "Implement auto-versioning and confirmation prompts"
  
  - symptom: "Cannot recover from mistakes"
    fix: "Add rollback capability via transaction logs"

related_principles:
  - P7: Idempotence and Dry-Run
  - P15: Complete Before Claiming
  - P18: State Verification is Mandatory

changelog:
  - date: "2025-11-03"
    version: "1.0.0"
    changes: "Extracted for N5OS Lite"
