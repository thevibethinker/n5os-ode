<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V's Event Calendar</title>
  <style>
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111;
      --bg-tertiary: #1a1a1a;
      --bg-hover: #222;
      --text-primary: #f5f5f5;
      --text-secondary: #a0a0a0;
      --text-muted: #666;
      --border-color: #2a2a2a;
      --accent-green: #22c55e;
      --accent-yellow: #eab308;
      --accent-red: #ef4444;
      --accent-blue: #3b82f6;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
    }
    
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-color);
      flex-wrap: wrap;
      gap: 16px;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    
    .view-toggle {
      display: flex;
      background: var(--bg-tertiary);
      border-radius: var(--radius-sm);
      padding: 4px;
    }
    
    .view-btn {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
    }
    
    .view-btn:hover { color: var(--text-primary); }
    .view-btn.active { background: var(--bg-hover); color: var(--text-primary); }
    
    .stats {
      display: flex;
      gap: 12px;
      font-size: 0.875rem;
    }
    
    .stat {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      background: var(--bg-tertiary);
    }
    
    .stat-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .stat.yes .stat-dot { background: var(--accent-green); }
    .stat.maybe .stat-dot { background: var(--accent-yellow); }
    .stat.undecided .stat-dot { background: var(--text-muted); }
    
    /* Filters */
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      padding: 8px 16px;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-secondary);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }
    
    .filter-btn:hover { border-color: var(--text-muted); color: var(--text-primary); }
    .filter-btn.active { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }
    
    /* Calendar Grid View */
    .calendar-month {
      display: none;
    }
    
    .calendar-month.active {
      display: block;
    }
    
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    
    .month-title {
      font-size: 1.25rem;
      font-weight: 600;
    }
    
    .month-nav-btn {
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }
    
    .month-nav-btn:hover { border-color: var(--text-muted); color: var(--text-primary); }
    
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      background: var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    
    .calendar-header {
      background: var(--bg-tertiary);
      padding: 12px 8px;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .calendar-day {
      background: var(--bg-secondary);
      min-height: 100px;
      padding: 8px;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .calendar-day:hover { background: var(--bg-tertiary); }
    .calendar-day.other-month { opacity: 0.4; }
    .calendar-day.today { background: var(--bg-tertiary); }
    .calendar-day.today::before {
      content: '';
      position: absolute;
      top: 4px;
      right: 4px;
      width: 6px;
      height: 6px;
      background: var(--accent-blue);
      border-radius: 50%;
    }
    
    .day-number {
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }
    
    .calendar-day.today .day-number { color: var(--accent-blue); font-weight: 700; }
    
    .day-events {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    
    .day-event {
      font-size: 0.7rem;
      padding: 3px 6px;
      border-radius: 4px;
      background: var(--bg-hover);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    
    .day-event.decided-yes { background: rgba(34, 197, 94, 0.2); border-left: 2px solid var(--accent-green); }
    .day-event.decided-maybe { background: rgba(234, 179, 8, 0.2); border-left: 2px solid var(--accent-yellow); }
    .day-event.decided-no { opacity: 0.4; }
    
    .day-event-more {
      font-size: 0.65rem;
      color: var(--text-muted);
      padding: 2px 6px;
    }
    
    /* List View */
    .list-view {
      display: none;
    }
    
    .list-view.active {
      display: block;
    }
    
    .date-group {
      margin-bottom: 32px;
    }
    
    .date-group-header {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .date-group-day {
      font-size: 1.125rem;
      font-weight: 600;
    }
    
    .date-group-label {
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    
    .date-group-label.today { color: var(--accent-blue); font-weight: 500; }
    .date-group-label.tomorrow { color: var(--accent-green); }
    
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    
    /* Event Card */
    .event-card {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: all 0.2s;
      border: 1px solid var(--border-color);
    }
    
    .event-card:hover {
      border-color: var(--text-muted);
      transform: translateY(-2px);
    }
    
    .event-card.decided-yes { border-left: 3px solid var(--accent-green); }
    .event-card.decided-no { opacity: 0.5; border-left: 3px solid var(--accent-red); }
    .event-card.decided-maybe { border-left: 3px solid var(--accent-yellow); }
    
    .event-cover {
      width: 100%;
      height: 140px;
      object-fit: cover;
      background: var(--bg-tertiary);
    }
    
    .event-cover-placeholder {
      width: 100%;
      height: 80px;
      background: linear-gradient(135deg, var(--bg-tertiary) 0%, var(--bg-hover) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: var(--text-muted);
    }
    
    .event-content {
      padding: 16px;
    }
    
    .event-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
      line-height: 1.4;
    }
    
    .event-title a {
      color: inherit;
      text-decoration: none;
    }
    
    .event-title a:hover { color: var(--accent-blue); }
    
    .event-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    
    .event-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .event-meta-icon {
      width: 14px;
      text-align: center;
      color: var(--text-muted);
    }
    
    .event-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 12px;
    }
    
    .event-tag {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 10px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }
    
    .event-tag.free { background: rgba(34, 197, 94, 0.15); color: var(--accent-green); }
    .event-tag.score-high { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
    
    .event-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--border-color);
    }
    
    .event-organizer {
      font-size: 0.75rem;
      color: var(--text-muted);
      max-width: 60%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .event-actions {
      display: flex;
      gap: 6px;
    }
    
    .action-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    
    .action-btn:hover { border-color: var(--text-muted); color: var(--text-primary); }
    
    .action-btn.yes:hover, .action-btn.yes.active {
      background: var(--accent-green);
      border-color: var(--accent-green);
      color: white;
    }
    
    .action-btn.maybe:hover, .action-btn.maybe.active {
      background: var(--accent-yellow);
      border-color: var(--accent-yellow);
      color: black;
    }
    
    .action-btn.no:hover, .action-btn.no.active {
      background: var(--accent-red);
      border-color: var(--accent-red);
      color: white;
    }
    
    /* Event Detail Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .modal-overlay.active { display: flex; }
    
    .modal-content {
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow: auto;
    }
    
    .modal-cover {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }
    
    .modal-body {
      padding: 24px;
    }
    
    .modal-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    
    .modal-meta {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .modal-meta-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    
    .modal-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .modal-btn {
      flex: 1;
      min-width: 100px;
      padding: 12px 20px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--text-primary);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .modal-btn:hover { border-color: var(--text-muted); }
    .modal-btn.primary { background: var(--accent-blue); border-color: var(--accent-blue); }
    .modal-btn.primary:hover { background: #2563eb; }
    
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.5);
      color: white;
      cursor: pointer;
      font-size: 1.2rem;
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    
    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    
    /* Mobile Responsive */
    @media (max-width: 768px) {
      .container { padding: 16px; }
      
      header { flex-direction: column; align-items: flex-start; }
      
      .stats { width: 100%; justify-content: space-between; }
      
      .calendar-day { min-height: 70px; padding: 4px; }
      .day-number { font-size: 0.75rem; }
      .day-event { display: none; }
      .day-event:first-child { display: block; }
      .day-event-more { display: block !important; }
      
      .events-grid { grid-template-columns: 1fr; }
      
      .event-cover { height: 120px; }
      
      .controls { flex-direction: column; align-items: flex-start; }
      .filters { width: 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 8px; }
    }
    
    @media (max-width: 480px) {
      h1 { font-size: 1.25rem; }
      .view-toggle { width: 100%; }
      .view-btn { flex: 1; text-align: center; }
      .stat { padding: 4px 8px; font-size: 0.75rem; }
      .filter-btn { padding: 6px 12px; font-size: 0.8rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <h1>📅 Event Calendar</h1>
        <div class="view-toggle">
          <button class="view-btn active" data-view="list">List</button>
          <button class="view-btn" data-view="calendar">Calendar</button>
        </div>
      </div>
      <div class="stats" id="stats">
        <span class="stat yes"><span class="stat-dot"></span><span id="stat-yes">0</span> Going</span>
        <span class="stat maybe"><span class="stat-dot"></span><span id="stat-maybe">0</span> Maybe</span>
        <span class="stat undecided"><span class="stat-dot"></span><span id="stat-undecided">0</span> Undecided</span>
      </div>
    </header>
    
    <div class="controls">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="undecided">Undecided</button>
        <button class="filter-btn" data-filter="yes">Going</button>
        <button class="filter-btn" data-filter="maybe">Maybe</button>
        <button class="filter-btn" data-filter="no">Not Going</button>
      </div>
    </div>
    
    <!-- Calendar View -->
    <div class="calendar-month" id="calendarView">
      <div class="month-nav">
        <button class="month-nav-btn" id="prevMonth">← Prev</button>
        <span class="month-title" id="monthTitle">December 2025</span>
        <button class="month-nav-btn" id="nextMonth">Next →</button>
      </div>
      <div class="calendar-grid" id="calendarGrid">
        <!-- Calendar headers and days will be rendered here -->
      </div>
    </div>
    
    <!-- List View -->
    <div class="list-view active" id="listView">
      <div class="loading">Loading events...</div>
    </div>
  </div>
  
  <!-- Event Detail Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-content">
      <img class="modal-cover" id="modalCover" src="" alt="">
      <div class="modal-body">
        <h2 class="modal-title" id="modalTitle"></h2>
        <div class="modal-meta" id="modalMeta"></div>
        <div class="modal-actions" id="modalActions"></div>
      </div>
    </div>
  </div>
  
  <script>
    let allEvents = [];
    let currentFilter = 'all';
    let currentView = 'list';
    let currentMonth = new Date();
    
    // Load events from API
    async function loadEvents() {
      try {
        const res = await fetch('/api/events');
        const data = await res.json();
        allEvents = data.events;
        render();
        loadStats();
      } catch (err) {
        document.getElementById('listView').innerHTML = 
          '<div class="empty-state"><div class="empty-state-icon">📭</div>Failed to load events</div>';
      }
    }
    
    async function loadStats() {
      try {
        const res = await fetch('/api/stats');
        const stats = await res.json();
        document.getElementById('stat-yes').textContent = stats.decided.yes;
        document.getElementById('stat-maybe').textContent = stats.decided.maybe;
        document.getElementById('stat-undecided').textContent = stats.undecided;
      } catch (err) {}
    }
    
    function render() {
      if (currentView === 'list') {
        renderListView();
      } else {
        renderCalendarView();
      }
    }
    
    function getFilteredEvents() {
      if (currentFilter === 'all') return allEvents;
      if (currentFilter === 'undecided') return allEvents.filter(e => !e.decision);
      return allEvents.filter(e => e.decision === currentFilter);
    }
    
    function getDateLabel(dateStr) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);
      const nextWeek = new Date(today);
      nextWeek.setDate(nextWeek.getDate() + 7);
      
      const eventDate = new Date(dateStr + 'T12:00:00');
      eventDate.setHours(0, 0, 0, 0);
      
      if (eventDate.getTime() === today.getTime()) return { label: 'Today', class: 'today' };
      if (eventDate.getTime() === tomorrow.getTime()) return { label: 'Tomorrow', class: 'tomorrow' };
      if (eventDate < nextWeek) return { label: 'This Week', class: '' };
      return { label: '', class: '' };
    }
    
    function formatDate(dateStr) {
      const date = new Date(dateStr + 'T12:00:00');
      return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    
    function renderListView() {
      const listView = document.getElementById('listView');
      const filtered = getFilteredEvents();
      
      if (filtered.length === 0) {
        listView.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div>No events found</div>';
        return;
      }
      
      // Group by date
      const grouped = {};
      filtered.forEach(event => {
        const date = event.date.split('T')[0];
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(event);
      });
      
      let html = '';
      Object.keys(grouped).sort().forEach(date => {
        const events = grouped[date];
        const dateLabel = getDateLabel(date);
        
        html += `
          <div class="date-group">
            <div class="date-group-header">
              <span class="date-group-day">${formatDate(date)}</span>
              ${dateLabel.label ? `<span class="date-group-label ${dateLabel.class}">${dateLabel.label}</span>` : ''}
            </div>
            <div class="events-grid">
              ${events.map(e => renderEventCard(e)).join('')}
            </div>
          </div>
        `;
      });
      
      listView.innerHTML = html;
    }
    
    function renderEventCard(event) {
      const decisionClass = event.decision ? `decided-${event.decision}` : '';
      const coverImg = event.coverImage 
        ? `<img class="event-cover" src="${event.coverImage}" alt="" loading="lazy">`
        : `<div class="event-cover-placeholder">📅</div>`;
      
      const tags = [];
      if (event.price === 'Free' || event.price === 'free') {
        tags.push('<span class="event-tag free">Free</span>');
      }
      if (event.score >= 10) {
        tags.push('<span class="event-tag score-high">★ High Match</span>');
      }
      if (event.attendees > 100) {
        tags.push(`<span class="event-tag">${event.attendees}+ attending</span>`);
      }
      
      return `
        <div class="event-card ${decisionClass}" data-id="${event.id}" onclick="showEventDetail('${event.id}')">
          ${coverImg}
          <div class="event-content">
            <h3 class="event-title"><a href="${event.url}" target="_blank" onclick="event.stopPropagation()">${event.title}</a></h3>
            <div class="event-meta">
              ${event.time ? `<div class="event-meta-item"><span class="event-meta-icon">🕐</span>${event.time}</div>` : ''}
              ${event.location ? `<div class="event-meta-item"><span class="event-meta-icon">📍</span>${event.location}</div>` : ''}
            </div>
            ${tags.length ? `<div class="event-tags">${tags.join('')}</div>` : ''}
            <div class="event-footer">
              <span class="event-organizer">${event.organizer || 'Luma Event'}</span>
              <div class="event-actions">
                <button class="action-btn yes ${event.decision === 'yes' ? 'active' : ''}" 
                        onclick="event.stopPropagation(); decide('${event.id}', 'yes')" title="Going">✓</button>
                <button class="action-btn maybe ${event.decision === 'maybe' ? 'active' : ''}" 
                        onclick="event.stopPropagation(); decide('${event.id}', 'maybe')" title="Maybe">?</button>
                <button class="action-btn no ${event.decision === 'no' ? 'active' : ''}" 
                        onclick="event.stopPropagation(); decide('${event.id}', 'no')" title="Not Going">✗</button>
              </div>
            </div>
          </div>
        </div>
      `;
    }
    
    function renderCalendarView() {
      const grid = document.getElementById('calendarGrid');
      const monthTitle = document.getElementById('monthTitle');
      
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      
      monthTitle.textContent = currentMonth.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const startDay = firstDay.getDay();
      const daysInMonth = lastDay.getDate();
      
      // Get events for this month
      const eventsByDate = {};
      getFilteredEvents().forEach(e => {
        const d = e.date.split('T')[0];
        if (!eventsByDate[d]) eventsByDate[d] = [];
        eventsByDate[d].push(e);
      });
      
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      
      let html = '';
      
      // Header row
      const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      days.forEach(d => {
        html += `<div class="calendar-header">${d}</div>`;
      });
      
      // Previous month days
      const prevMonthDays = new Date(year, month, 0).getDate();
      for (let i = startDay - 1; i >= 0; i--) {
        html += `<div class="calendar-day other-month"><span class="day-number">${prevMonthDays - i}</span></div>`;
      }
      
      // Current month days
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const isToday = new Date(year, month, day).getTime() === today.getTime();
        const dayEvents = eventsByDate[dateStr] || [];
        
        const eventsHtml = dayEvents.slice(0, 2).map(e => {
          const cls = e.decision ? `decided-${e.decision}` : '';
          return `<div class="day-event ${cls}" onclick="showEventDetail('${e.id}')">${e.title}</div>`;
        }).join('');
        
        const moreCount = dayEvents.length - 2;
        const moreHtml = moreCount > 0 ? `<div class="day-event-more">+${moreCount} more</div>` : '';
        
        html += `
          <div class="calendar-day ${isToday ? 'today' : ''}" data-date="${dateStr}">
            <span class="day-number">${day}</span>
            <div class="day-events">${eventsHtml}${moreHtml}</div>
          </div>
        `;
      }
      
      // Next month days
      const totalCells = startDay + daysInMonth;
      const remaining = (7 - (totalCells % 7)) % 7;
      for (let i = 1; i <= remaining; i++) {
        html += `<div class="calendar-day other-month"><span class="day-number">${i}</span></div>`;
      }
      
      grid.innerHTML = html;
    }
    
    function showEventDetail(eventId) {
      const event = allEvents.find(e => e.id === eventId);
      if (!event) return;
      
      const modal = document.getElementById('modal');
      const cover = document.getElementById('modalCover');
      const title = document.getElementById('modalTitle');
      const meta = document.getElementById('modalMeta');
      const actions = document.getElementById('modalActions');
      
      cover.src = event.coverImage || '';
      cover.style.display = event.coverImage ? 'block' : 'none';
      title.textContent = event.title;
      
      meta.innerHTML = `
        <div class="modal-meta-item">📅 ${formatDate(event.date)}</div>
        ${event.time ? `<div class="modal-meta-item">🕐 ${event.time}</div>` : ''}
        ${event.location ? `<div class="modal-meta-item">📍 ${event.location}</div>` : ''}
        ${event.address ? `<div class="modal-meta-item">🏠 ${event.address}</div>` : ''}
        ${event.organizer ? `<div class="modal-meta-item">👤 ${event.organizer}</div>` : ''}
        ${event.price ? `<div class="modal-meta-item">💵 ${event.price}</div>` : ''}
      `;
      
      actions.innerHTML = `
        <button class="modal-btn" onclick="decide('${event.id}', 'yes'); closeModal()">✓ Going</button>
        <button class="modal-btn" onclick="decide('${event.id}', 'maybe'); closeModal()">? Maybe</button>
        <button class="modal-btn" onclick="decide('${event.id}', 'no'); closeModal()">✗ Skip</button>
        <a href="${event.url}" target="_blank" class="modal-btn primary" style="text-decoration:none;text-align:center">Open in Luma →</a>
      `;
      
      modal.classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('modal').classList.remove('active');
    }
    
    async function decide(eventId, decision) {
      try {
        await fetch(`/api/events/${eventId}/decide`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ decision })
        });
        
        const event = allEvents.find(e => e.id === eventId);
        if (event) event.decision = decision;
        
        render();
        loadStats();
      } catch (err) {
        console.error('Failed to save decision:', err);
      }
    }
    
    // View toggle
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;
        
        document.getElementById('listView').classList.toggle('active', currentView === 'list');
        document.getElementById('calendarView').classList.toggle('active', currentView === 'calendar');
        
        render();
      });
    });
    
    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });
    
    // Month navigation
    document.getElementById('prevMonth').addEventListener('click', () => {
      currentMonth.setMonth(currentMonth.getMonth() - 1);
      renderCalendarView();
    });
    
    document.getElementById('nextMonth').addEventListener('click', () => {
      currentMonth.setMonth(currentMonth.getMonth() + 1);
      renderCalendarView();
    });
    
    // Close modal on overlay click
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeModal();
    });
    
    // Keyboard close
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });
    
    // Initial load
    loadEvents();
  </script>
</body>
</html>
