longevity:
  
  apoe_status:
    haplotype: "Likely ε2/ε3 or ε3/ε3 (Protective)"
    rs429358:
      genotype: TT
      status: PROTECTIVE
    rs7412:
      genotype: "--"  # No call
      status: UNKNOWN
      interpretation: |
        No call at rs7412. This SNP determines ε2 vs ε3.
        TT at rs429358 rules out ε4 (which requires C).
        Combined with TT at rs429358, you are NOT an ε4 carrier.
        Most likely ε2/ε3 or ε3/ε3 (both protective).
        
  foxo3:
    rs2802292:
      genotype: GG
      status: PROTECTIVE
      interpretation: |
        Homozygous for longevity-associated G allele.
        FOXO3 regulates stress resistance, DNA repair, 
        and cellular maintenance. GG genotype associated 
        with 2.7x increased odds of reaching 100+ in 
        Okinawan and European studies.

# ============================================
# TIER 2: COGNITIVE & NEUROTRANSMITTER
# ============================================

cognitive:

  comt:
    rs4680:
      genotype: GG  # VAL/VAL
      status: WARRIOR
      interpretation: |
        Fast dopamine clearance (3-4x faster than MET/MET).
        
        Strengths:
        - Better stress performance under pressure
        - More resilient to pain
        - Less prone to rumination
        
        Vulnerabilities:
        - Baseline dopamine levels may be lower
        - More sensitive to dopamine depletion (poor sleep, stress)
        - May need environmental optimization for sustained focus
        
        Optimization:
        - Regular sleep is non-negotiable
        - Orderly, aesthetic workspace supports focus
        - Bupropion compensates for fast clearance
        
  bdnf:
    rs6265:
      genotype: TT  # VAL/VAL (T=Val, C=Met in this orientation)
      status: STANDARD
      interpretation: |
        Normal BDNF secretion and neuroplasticity.
        No enhanced anxiety sensitivity (unlike MET carriers).
        Standard response to exercise-induced BDNF boost.
        
        Note: TT at rs6265 = VAL/VAL phenotype (protective).

# ============================================
# TIER 3: METABOLISM & NUTRITION
# ============================================

metabolism:

  mthfr:
    rs1801133:
      genotype: AG  # Heterozygous C677T
      status: INTERMEDIATE_METABOLIZER
      interpretation: |
        ~65% enzyme activity (vs 100% for AA/CC wild-type).
        Reduced ability to convert folic acid → methylfolate.
        
        Implications:
        - Prefer methylated B vitamins (methylfolate, methylcobalamin)
        - Avoid synthetic folic acid in fortified foods when possible
        - May benefit from additional folate-rich whole foods
        
        Action: Use methylated multivitamin (confirmed in stack)

  fto:
    rs9939609:
      genotype: AA
      status: ELEVATED_RISK
      interpretation: |
        Homozygous for risk allele.
        Associated with:
        - Higher hunger/appetite signaling
        - Increased BMI tendency (+3kg average)
        - Reduced satiety response
        
        Mitigation:
        - Protein-forward meals improve satiety
        - Meal timing consistency helps regulate hunger
        - Tracking portions is more important for you than average
        
        Note: This is NOT destiny - it's a headwind to be aware of.

  caffeine_metabolism:
    rs762551:
      genotype: AC
      gene: CYP1A2
      status: SLOW_METABOLIZER
      interpretation: |
        Heterozygous AC = Slow/Intermediate caffeine metabolism.
        Caffeine half-life extended (6-8 hours vs 3-4 for fast).
        
        Implications:
        - Cut off caffeine by 2pm for optimal sleep
        - Even afternoon tea may disrupt sleep quality
        - Morning coffee is fine, but limit to 1-2 cups
        
  vitamin_d_binding:
    rs2282679:
      genotype: GT
      status: INTERMEDIATE
      interpretation: |
        Heterozygous = Intermediate vitamin D bioavailability.
        May need slightly higher supplementation than GG genotype.
        Recommend blood test to establish personal baseline.
        Target: 50-70 ng/mL

