  # STIMULANTS (Alternating)
  # ===================
  adderall:
    generic_name: Mixed Amphetamine Salts (Amphetamine/Dextroamphetamine)
    brand: Adderall IR
    dose: 30mg
    frequency: As needed (alternates with Vyvanse)
    timing: Morning
    prescriber: TBD
    indication: ADHD / Executive Function
    genesight_status: Use As Directed
    pharmacogenomics:
      metabolized_by: CYP2D6
      cyp2d6_status: normal
