  vyvanse:
    generic_name: Lisdexamfetamine
    brand: Vyvanse
    dose: 60mg
    frequency: As needed (alternates with Adderall)
    timing: Morning
    prescriber: TBD
    indication: ADHD / Executive Function
    genesight_status: Use As Directed
    pharmacogenomics:
      metabolized_by: CYP2D6 (after conversion)
      cyp2d6_status: normal
