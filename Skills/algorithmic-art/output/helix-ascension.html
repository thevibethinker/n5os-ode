<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helix Ascension — Generative Art Viewer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 {
            font-size: 16px; font-weight: 600; color: var(--anthropic-dark);
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 12px; border-radius: 8px;
            font-family: 'Courier New', monospace; font-size: 14px; margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray); text-align: center;
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217,119,87,0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .regen-button { margin-bottom: 0; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] {
            flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange);
            border-radius: 50%; cursor: pointer; transition: all 0.2s ease;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; border: none; cursor: pointer;
        }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); }
        .button {
            background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px;
            border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer;
            transition: all 0.2s ease; width: 100%;
        }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container {
            width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(20,20,19,0.1); background: white;
        }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--anthropic-mid-gray); padding: 40px; }
        .toggle-container { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .toggle-container label { font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 0; }
        .toggle-switch { position: relative; width: 44px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--anthropic-light-gray); border-radius: 24px; transition: 0.3s;
        }
        .toggle-slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background: white; border-radius: 50%; transition: 0.3s;
        }
        .toggle-switch input:checked + .toggle-slider { background: var(--anthropic-orange); }
        .toggle-switch input:checked + .toggle-slider:before { transform: translateX(20px); }
        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Helix Ascension</h1>
            <div class="subtitle">Double-helix interference patterns. Two counter-rotating bundles of filaments create moiré density where they cross.</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">&#8592; Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next &#8594;</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">&#8635; Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Filaments per Strand</label>
                    <div class="slider-container">
                        <input type="range" id="filaments" min="8" max="60" step="1" value="28" oninput="updateParam('filaments', this.value)">
                        <span class="value-display" id="filaments-value">28</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Twist Rate</label>
                    <div class="slider-container">
                        <input type="range" id="twistRate" min="0.5" max="4.0" step="0.1" value="1.8" oninput="updateParam('twistRate', this.value)">
                        <span class="value-display" id="twistRate-value">1.8</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Helix Amplitude</label>
                    <div class="slider-container">
                        <input type="range" id="amplitude" min="50" max="400" step="10" value="200" oninput="updateParam('amplitude', this.value)">
                        <span class="value-display" id="amplitude-value">200</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Vertical Stretch</label>
                    <div class="slider-container">
                        <input type="range" id="verticalStretch" min="0.5" max="2.0" step="0.05" value="1.0" oninput="updateParam('verticalStretch', this.value)">
                        <span class="value-display" id="verticalStretch-value">1.0</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Line Weight</label>
                    <div class="slider-container">
                        <input type="range" id="lineWeight" min="0.3" max="2.5" step="0.1" value="0.8" oninput="updateParam('lineWeight', this.value)">
                        <span class="value-display" id="lineWeight-value">0.8</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Noise Warp</label>
                    <div class="slider-container">
                        <input type="range" id="noiseWarp" min="0" max="80" step="2" value="20" oninput="updateParam('noiseWarp', this.value)">
                        <span class="value-display" id="noiseWarp-value">20</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Phase Offset</label>
                    <div class="slider-container">
                        <input type="range" id="phaseOffset" min="0" max="6.28" step="0.05" value="3.14" oninput="updateParam('phaseOffset', this.value)">
                        <span class="value-display" id="phaseOffset-value">3.14</span>
                    </div>
                </div>

                <div class="toggle-container">
                    <label>Chromatic Mode</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="chromatic" onchange="updateParam('chromatic', this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="toggle-container">
                    <label>Show Frame</label>
                    <label class="toggle-switch">
                        <input type="checkbox" id="showFrame" checked onchange="updateParam('showFrame', this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <div id="colors-section" class="control-section" style="display:none;">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>Strand A</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorA" value="#1a1a2e" onchange="updateColor('colorA', this.value)">
                        <span class="color-value" id="colorA-value">#1a1a2e</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Strand B</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorB" value="#6a2c70" onchange="updateColor('colorB', this.value)">
                        <span class="color-value" id="colorB-value">#6a2c70</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row" style="margin-bottom:8px;">
                    <button class="button" onclick="resetParameters()">Reset</button>
                    <button class="button secondary" onclick="downloadPNG()">Download PNG</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing Helix Ascension...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            filaments: 28,
            twistRate: 1.8,
            amplitude: 200,
            verticalStretch: 1.0,
            lineWeight: 0.8,
            noiseWarp: 20,
            phaseOffset: Math.PI,
            chromatic: false,
            showFrame: true,
            colorA: '#1a1a2e',
            colorB: '#6a2c70'
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            pixelDensity(1);
            generateHelix();
            document.querySelector('.loading').style.display = 'none';
        }

        function draw() {}

        function generateHelix() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            background(250, 249, 245);

            let cx = width / 2;
            let cy = height / 2;
            let totalHeight = height * 0.82 * params.verticalStretch;
            let topY = cy - totalHeight / 2;
            let steps = 800;
            let amp = params.amplitude;
            let tw = params.twistRate;
            let nf = params.filaments;
            let nw = params.noiseWarp;
            let po = params.phaseOffset;
            let lw = params.lineWeight;

            // Seed-driven variation
            let ampJitter = map(random(), 0, 1, 0.85, 1.15);
            let twistJitter = map(random(), 0, 1, -0.2, 0.2);
            let skewX = map(random(), 0, 1, -15, 15);
            let noiseOffsetA = random() * 1000;
            let noiseOffsetB = random() * 1000;
            let taperTop = map(random(), 0, 1, 0.3, 0.7);
            let taperBottom = map(random(), 0, 1, 0.3, 0.7);

            amp *= ampJitter;
            tw += twistJitter;

            // Frame
            if (params.showFrame) {
                let frameW = width * 0.52;
                let frameH = height * 0.72;
                let fx = cx - frameW / 2;
                let fy = cy - frameH / 2;
                noFill();
                stroke(20);
                strokeWeight(3.5);
                rect(fx, fy, frameW, frameH);
            }

            // Generate both strands
            for (let strand = 0; strand < 2; strand++) {
                let phase = strand * po;
                let noiseOff = strand === 0 ? noiseOffsetA : noiseOffsetB;
                let col;
                if (params.chromatic) {
                    col = strand === 0 ? params.colorA : params.colorB;
                } else {
                    col = '#141413';
                }

                let rgb = hexToRgb(col);

                for (let f = 0; f < nf; f++) {
                    let filamentOffset = map(f, 0, nf - 1, -1, 1);
                    let spreadFactor = 0.08 + abs(filamentOffset) * 0.12;

                    // Alpha varies by distance from center of bundle
                    let alphaBase = params.chromatic
                        ? map(abs(filamentOffset), 0, 1, 200, 60)
                        : map(abs(filamentOffset), 0, 1, 220, 40);

                    stroke(rgb.r, rgb.g, rgb.b, alphaBase);
                    strokeWeight(lw * map(abs(filamentOffset), 0, 1, 1.0, 0.4));
                    noFill();

                    beginShape();
                    for (let i = 0; i <= steps; i++) {
                        let t = i / steps;
                        let y = topY + t * totalHeight;

                        // Taper envelope: pinch at top and bottom
                        let envelope = 1.0;
                        if (t < taperTop * 0.3) {
                            envelope = smoothStep(0, taperTop * 0.3, t);
                        }
                        if (t > 1.0 - taperBottom * 0.3) {
                            envelope = smoothStep(1.0, 1.0 - taperBottom * 0.3, t);
                        }

                        let angle = t * tw * TWO_PI + phase;

                        // Main helix x-position
                        let helixX = sin(angle) * amp * envelope;
                        // Filament spread perpendicular to helix tangent
                        let tangentAngle = atan2(1, cos(angle) * amp * tw * TWO_PI / totalHeight);
                        let perpX = cos(tangentAngle + HALF_PI) * filamentOffset * amp * spreadFactor * envelope;
                        let perpY = sin(tangentAngle + HALF_PI) * filamentOffset * amp * spreadFactor * envelope * 0.3;

                        // Noise warp
                        let nx = noise(t * 3 + noiseOff, f * 0.1) * 2 - 1;
                        let ny = noise(t * 3 + noiseOff + 100, f * 0.1) * 2 - 1;

                        let px = cx + helixX + perpX + nx * nw * envelope + skewX * (t - 0.5);
                        let py = y + perpY + ny * nw * 0.3 * envelope;

                        curveVertex(px, py);
                        if (i === 0 || i === steps) curveVertex(px, py);
                    }
                    endShape();
                }
            }

            noLoop();
        }

        function smoothStep(edge0, edge1, x) {
            let t = constrain((x - edge0) / (edge1 - edge0), 0, 1);
            return t * t * (3 - 2 * t);
        }

        function hexToRgb(hex) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        // UI handlers
        function updateParam(name, value) {
            if (name === 'chromatic') {
                params.chromatic = value;
                document.getElementById('colors-section').style.display = value ? 'block' : 'none';
            } else if (name === 'showFrame') {
                params.showFrame = value;
            } else {
                params[name] = parseFloat(value);
            }
            document.getElementById(name + '-value') && (document.getElementById(name + '-value').textContent = typeof value === 'boolean' ? (value ? 'On' : 'Off') : value);
            loop();
            generateHelix();
        }

        function updateColor(id, value) {
            if (id === 'colorA') params.colorA = value;
            if (id === 'colorB') params.colorB = value;
            document.getElementById(id + '-value').textContent = value;
            loop();
            generateHelix();
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                loop();
                generateHelix();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            loop();
            generateHelix();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            loop();
            generateHelix();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            loop();
            generateHelix();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));
            document.getElementById('filaments').value = params.filaments;
            document.getElementById('filaments-value').textContent = params.filaments;
            document.getElementById('twistRate').value = params.twistRate;
            document.getElementById('twistRate-value').textContent = params.twistRate;
            document.getElementById('amplitude').value = params.amplitude;
            document.getElementById('amplitude-value').textContent = params.amplitude;
            document.getElementById('verticalStretch').value = params.verticalStretch;
            document.getElementById('verticalStretch-value').textContent = params.verticalStretch;
            document.getElementById('lineWeight').value = params.lineWeight;
            document.getElementById('lineWeight-value').textContent = params.lineWeight;
            document.getElementById('noiseWarp').value = params.noiseWarp;
            document.getElementById('noiseWarp-value').textContent = params.noiseWarp;
            document.getElementById('phaseOffset').value = params.phaseOffset;
            document.getElementById('phaseOffset-value').textContent = params.phaseOffset.toFixed(2);
            document.getElementById('chromatic').checked = params.chromatic;
            document.getElementById('showFrame').checked = params.showFrame;
            document.getElementById('colors-section').style.display = 'none';
            document.getElementById('colorA').value = params.colorA;
            document.getElementById('colorA-value').textContent = params.colorA;
            document.getElementById('colorB').value = params.colorB;
            document.getElementById('colorB-value').textContent = params.colorB;
            updateSeedDisplay();
            loop();
            generateHelix();
        }

        function downloadPNG() {
            saveCanvas('helix-ascension-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
