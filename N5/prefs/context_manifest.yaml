version: "1.0"

# CONTEXT GROUPS
# Static collections of files for specific modes
# All paths are relative to workspace root after installation
groups:
  build:
    description: "Implementation, refactoring, coding, engineering"
    files:
      - "N5/prefs/operations/planning_prompt.md"
      - "N5/prefs/principles/principles_index.yaml"

  strategy:
    description: "High-level thinking, planning, decision making, reasoning"
    files:
      - "N5/prefs/principles/principles_index.yaml"
      - "N5/prefs/prefs.md"

  system:
    description: "Lists, Index, System Operations, Database"
    files:
      - "N5/schemas/index.schema.json"
      - "Lists/POLICY.md"

  safety:
    description: "Destructive ops, moves, deletes"
    files:
      - "N5/scripts/n5_safety.py"
      - "N5/prefs/principles/P05_safety_determinism.yaml"

  scheduler:
    description: "Agents, Scheduled Tasks, Automation"
    files:
      - "N5/prefs/operations/scheduled-task-protocol.md"

  writer:
    description: "Content creation, writing, polished communication"
    files:
      - "N5/prefs/communication/style-guide.md"
      - "N5/prefs/communication/voice-primitives-system.md"
      # Optional: Add your own psychographic portrait after personalization
      # - "Knowledge/content-library/personal/psychographic-portrait.md"

  research:
    description: "Deep dive, analysis, web research"
    files:
      - "N5/prefs/principles/P04_ontology_weighted.yaml"
      - "N5/prefs/operations/planning_prompt.md"

  health:
    description: "Health planning, bio-context, energy management"
    files: []
    # This group is intentionally empty in the base distribution.
    # After personalization, add your own health files:
    # - "Personal/Health/synthesis/Bio-Context.md"
    # - "Personal/Health/stack/current_medications.yaml"

  general:
    description: "Fallback for novel or undefined tasks"
    files:
      - "N5/prefs/prefs.md"

# PRINCIPLES CONFIG
principles_dir: "N5/prefs/principles"
