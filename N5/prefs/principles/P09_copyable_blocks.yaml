---
id: P9
name: Copyable Blocks
category: communication
priority: low
version: "1.0.0"
created: "2026-02-18"
related: [P8, P3]

purpose: |
  Provide crisp, ready-to-paste blocks for follow-ups, questions, and action items — surface the crux without boilerplate.

description: |
  When producing actionable output — follow-up emails, questions to ask, commands
  to run, text to send — format them as self-contained blocks that can be copied
  and used immediately. The user should not need to edit out filler, strip
  formatting, or extract the useful part from surrounding prose.

  This means using code blocks for commands, quoted blocks for draft messages,
  and clean bullet points for action items. Each block should be independently
  useful without requiring the surrounding context.

  The principle extends to any output the user might want to reuse: configuration
  snippets, API payloads, template text, or structured data. If it is likely to
  be copied, make it copy-ready.

anti_patterns:
  - "Embedding actionable text inside paragraphs of explanation"
  - "Providing commands or messages that need manual cleanup before use"
  - "Wrapping simple outputs in unnecessary formatting or boilerplate"

application:
  when: "Generating any output the user might copy, paste, or reuse directly"
  how: "Isolate actionable content in clean, self-contained blocks; minimize surrounding prose"
