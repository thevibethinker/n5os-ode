---
id: P9
name: Copyable Blocks Philosophy
category: communication
priority: medium
version: "1.0.0"
created: "2025-11-02"

purpose: |
  Provide crisp, ready-to-paste blocks for follow-ups and questions. Surface the crux without boilerplate.

when_to_apply:
  - Creating outputs for user action
  - Generating follow-up communications
  - Formatting action items or next steps

pattern:
  core_behavior: |
    Provide crisp, ready-to-paste blocks for follow-ups.
    Avoid boilerplate; surface the crux.
    Let user add connective tissue as needed.

examples:
  - description: Follow-up email draft
    good: "Core message ready to send; user can add greeting/closing"
    bad: "Verbose template with placeholder text requiring heavy editing"

anti_patterns:
  - symptom: "Outputs filled with boilerplate requiring extensive editing"
    fix: "Strip to essence; provide core message ready for light customization"
  
  - symptom: "Too much connective tissue obscuring key content"
    fix: "Surface crux first; let user add context as needed"

changelog:
  - date: "2025-11-02"
    version: "1.0.0"
    changes: "Initial YAML migration from operational_principles.md"
