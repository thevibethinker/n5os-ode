---
id: P12
name: Testing in Fresh Threads
category: quality
priority: medium
version: "1.0.0"
created: "2025-11-02"

purpose: |
  Validate changes in clean environments to ensure workflows only depend on declared files, not accumulated context.

when_to_apply:
  - Testing modified workflows or scripts
  - Validating that dependencies are properly declared
  - Ensuring reproducibility

pattern:
  core_behavior: |
    Run workflows in new thread to guarantee only declared files are in context.
    Tests reproducibility and proper dependency declaration.

examples:
  - description: Testing updated workflow
    good: "Open fresh conversation, run workflow, verify it works with only declared dependencies"
    bad: "Test in same thread where files are already loaded, missing dependency issues"

anti_patterns:
  - symptom: "Workflow works in development thread but fails elsewhere"
    fix: "Test in fresh thread to catch undeclared dependencies"
  
  - symptom: "Assuming context from current session will be available"
    fix: "Declare all dependencies explicitly; verify in clean environment"

changelog:
  - date: "2025-11-02"
    version: "1.0.0"
    changes: "Initial YAML migration from operational_principles.md"
