---
id: P14
name: Change Tracking
category: quality
priority: medium
version: "1.0.0"
created: "2025-11-02"

purpose: |
  Maintain concise change logs in standards files to track evolution and rationale for changes.

when_to_apply:
  - Modifying standards or principle files
  - Updating workflows or configurations
  - Making significant changes to documented processes

pattern:
  core_behavior: |
    Append concise change log entry to standards files.
    Format: "YYYY-MM-DD — Brief description of change"

examples:
  - description: Updating operational principles
    good: "Append: '2025-11-02 — Added tiered voice policy, anti-overwrite protections'"
    bad: "Modify file without documenting what changed or why"

anti_patterns:
  - symptom: "Files change over time with no record of what or why"
    fix: "Add change log entry with each significant modification"
  
  - symptom: "Verbose change logs obscuring actual changes"
    fix: "Keep entries concise; just enough to understand what changed"

changelog:
  - date: "2025-11-02"
    version: "1.0.0"
    changes: "Initial YAML migration from operational_principles.md"
