---
id: P31
name: Own The Planning Process
category: strategy
priority: critical
version: "1.0.0"
created: "2025-10-26"
related: [P28, P30, P27]

purpose: |
  YOU write plans. AI executes plans. Never delegate planning to AI. Planning requires judgment, taste, and ownership.

when_to_apply:
  - Building new systems
  - Making architectural decisions
  - Defining interfaces
  - Evaluating trade-offs

pattern:
  core_behavior: |
    YOU: What to build, why it matters, architecture, trade-offs, edge cases, quality standards. AI: How to implement, code generation, mechanical translation, handling as specified.

examples:
  - description: Planning ownership
    good: "Write detailed specification with architecture decisions, trap doors, rationale. Then: 'Generate code from this spec'"
    bad: "'Build me a command system. Make it good.' AI fills gaps with defaults, you don't own architecture"

anti_patterns:
  - symptom: "'Build me a system' (no spec)"
    fix: "AI plans for you, you lose control. Write spec first"
  - symptom: "Accepting AI architecture without evaluation"
    fix: "Evaluate explicitly. YOU must own decisions"

changelog:
  - date: "2025-10-26"
    version: "1.0.0"
    changes: "Initial principle from velocity coding talk"
  - date: "2025-11-02"
    version: "1.0.0"
    changes: "Migrated to YAML format from markdown"
