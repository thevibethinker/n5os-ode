---
id: P3
name: Voice Integration Policy
category: communication
priority: medium
version: "1.0.0"
created: "2025-11-02"

purpose: |
  Apply appropriate voice levels to different content tiers: neutral for extraction, full voice for user-facing outputs.

when_to_apply:
  - Processing extracted information from sources
  - Creating outputs for user consumption
  - Generating copyable blocks or deliverables

pattern:
  tier_mapping:
    extraction_factual: "voice_level: none"
    notable_details: "voice_level: light"
    action_items: "voice_level: none"
    questions: "voice_level: light"
    insights: "voice_level: none"
    copyable_outputs: "voice_level: full"

examples:
  - description: Meeting processing output
    good: "Extracted facts neutral; copyable follow-up email uses full voice"
    bad: "Everything in heavy voice, making facts hard to extract"

anti_patterns:
  - symptom: "All content uses same voice level regardless of purpose"
    fix: "Apply tiered voice policy matching content type to appropriate level"

changelog:
  - date: "2025-11-02"
    version: "1.0.0"
    changes: "Initial YAML migration from operational_principles.md"
