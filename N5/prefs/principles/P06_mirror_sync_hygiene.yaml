---
id: P6
name: Mirror Sync Hygiene
category: quality
priority: medium
version: "1.0.0"
created: "2025-11-02"

purpose: |
  Detect and handle mirror sync issues before performing destructive operations.

when_to_apply:
  - Before writing to files that may be synced
  - When file appears unexpectedly empty or truncated
  - During file system operations on synchronized directories

pattern:
  core_behavior: |
    If a file suddenly appears empty or truncated, suspect mirror sync.
    Action: halt writes, snapshot directory, compare checksums, then proceed.

examples:
  - description: File unexpectedly empty
    good: "Halt, check sync status, compare checksums, wait for resolution"
    bad: "Assume empty is correct and overwrite, losing synced content"

anti_patterns:
  - symptom: "Proceeding with writes when files appear corrupted or empty"
    fix: "Pause, investigate sync status, verify before proceeding"

changelog:
  - date: "2025-11-02"
    version: "1.0.0"
    changes: "Initial YAML migration from operational_principles.md"
