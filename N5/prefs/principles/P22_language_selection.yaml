---
id: P22
name: Language Selection
category: design
priority: medium
version: 1.0
created: 2025-11-02
last_updated: 2025-11-02
status: active

purpose: |
  Choose programming languages based on task requirements, not familiarity or trends.

personas:
  - Builder
  - Architect

trigger:
  - Starting new project or script
  - Choosing technology stack
  - Evaluating language for specific task

directive: |
  Select language based on: 1) Task requirements, 2) Ecosystem fit, 3) V's ability to maintain.
  Default to Python for scripts/analysis. Use specialized languages when clear advantage exists.

pattern: |
  Decision Framework:
  - Python: Default for scripts, data analysis, automation, AI/ML work
  - JavaScript/TypeScript: Web frontends, Node backends, full-stack apps
  - Bash: Simple file operations, system tasks, quick automation
  - SQL: Data queries and transformations
  - Go: Performance-critical services, CLI tools
  - Specialized: When ecosystem/performance demands it
  
  Always consider:
  - V's maintenance burden (non-technical founder)
  - Library ecosystem for task
  - Performance requirements
  - Team familiarity
  - Deployment context

examples:
  good:
    - Python for data processing script (rich ecosystem, V can read it)
    - TypeScript for web app (type safety, modern tooling)
    - Bash for simple file operations (direct, no dependencies)
  bad:
    - Rust for simple script (overkill, maintenance burden)
    - Python for high-performance service (wrong tool)
    - Complex language for one-off task (unnecessary complexity)

anti_patterns:
  - "Resume-driven development (choosing trendy language)"
  - "Language zealotry (one size fits all)"
  - "Premature optimization (complex language for simple task)"
  - "Ignoring maintenance burden on non-technical stakeholder"

related_principles:
  - P25
  - P32
  - P20

references:
  - Choose boring technology philosophy
  - Right tool for the job principle

changelog:
