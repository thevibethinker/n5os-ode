---
id: P34
name: Secrets Management
category: advanced
priority: high
version: "1.0.0"
created: "2026-02-18"
related: [P19, P5]

purpose: |
  Never hardcode secrets — use environment variables, never print or expose secret values, and store credentials in secure settings.

description: |
  Secrets — API keys, tokens, passwords, signing keys — must never appear in
  source code, configuration files, logs, or command output. They belong in
  environment variables loaded from a secure secrets store.

  This is non-negotiable. A single leaked API key can compromise an entire
  system. Secrets in git history persist even after deletion. Secrets in logs
  can be harvested by anyone with log access. The only safe approach is to
  never let secrets exist in plaintext outside the secrets store.

  In practice: read secrets from environment variables in code, never echo or
  print them in scripts, never include them in error messages, and never commit
  them to version control. Use tools like .env files (gitignored), platform
  secret stores, or dedicated secrets management services.

anti_patterns:
  - "Hardcoding API keys or tokens in source files"
  - "Printing secret values in logs or command output"
  - "Committing .env files or credentials to version control"
  - "Including secrets in error messages or debug output"

application:
  when: "Any operation involving credentials, API keys, tokens, or sensitive configuration"
  how: "Store in secure secrets settings, read from environment variables, never print or expose values"
