---
id: P24
name: Simulation Over Doing
category: strategy
priority: high
version: "1.0.0"
created: "2025-10-26"
related: [P7, P23, P27]

purpose: |
  Model, prototype, and test ideas in prose or throwaway code before building production systems.
  Simulation is faster and cheaper than doing.

when_to_apply:
  - Building new system component
  - Refactoring existing system
  - Making trap door decisions
  - Uncertain about approach
  - Multiple viable alternatives exist

pattern:
  core_behavior: |
    Write specifications, sketch architectures, prototype in disposable code, explore alternatives.
    Commit to implementation only after simulation reveals the right path.
  
  simulation_techniques:
    - Prose specifications (write how it works in English)
    - Architecture diagrams (sketch component interactions)
    - Throwaway prototypes (spike 2-3 approaches, delete all)
    - Mental models (walk through scenarios)
    - Toy examples (test concept with minimal data)
  
  integration_with_think_plan_execute:
    think_phase: Simulate in prose, diagrams, mental models
    plan_phase: Refine simulation into actionable spec, prototype if uncertain
    execute_phase: Generate production code from refined plan (simulation already solved hard problems)
    review_phase: Validate against original simulation

examples:
  - description: Think phase simulation - Command registry system
    good: "Write 15-minute prose spec that reveals duplicate handling, validation strategy, format choice as trap door, alternatives evaluated"
    bad: "Start coding immediately, discover problems 60% through, sunk cost fallacy prevents switching"
  
  - description: Prototype simulation - Testing JSONL vs SQLite
    good: "10-minute throwaway prototype measures performance, answers 'fast enough?' and 'need database?', then delete"
    bad: "Build full SQLite implementation first, discover JSONL would have been simpler"

anti_patterns:
  - symptom: "Skipping simulation with 'I know what to build'"
    fix: "You don't. Simulate first. 20 minutes thinking saves 4 hours coding"
  
  - symptom: "Prototyping in production (keeping throwaway code)"
    fix: "Throwaway code must be thrown away. Use /tmp, explicitly delete"
  
  - symptom: "Over-simulating (analysis paralysis)"
    fix: "Diminishing returns after 30min. Simulate enough to decide, then execute"
  
  - symptom: "Confusing simulation with planning"
    fix: "Simulation explores. Planning commits. Both are necessary"

tools:
  prose_simulation:
    - Markdown specifications
    - Architecture diagrams (D2, mermaid)
    - Scenario walkthroughs
  code_simulation:
    - /tmp for throwaway prototypes
    - --dry-run flags for testing
    - Jupyter notebooks for exploration
  mental_simulation:
    - "What if..." questioning
    - Edge case enumeration
    - Failure mode brainstorming

changelog:
