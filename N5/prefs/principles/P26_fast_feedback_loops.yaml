---
id: P26
name: Fast Feedback Loops
category: operations
priority: high
version: "1.0.0"
created: "2025-10-26"
related: [P7, P18, P19]

purpose: |
  Design systems for immediate feedback. The faster you see results, the faster you can iterate.
  Optimize for speed between action and outcome.

when_to_apply:
  - Waiting >30 seconds between action and result
  - Manual steps required to test changes
  - Can't test locally (requires deployment)
  - Long-running operations without progress updates
  - Errors discovered late in process

pattern:
  core_behavior: |
    Fast feedback maintains flow state, enables rapid iteration, catches errors early.
    Slow feedback kills momentum and compounds mistakes.
  
  feedback_hierarchy:
    instant: "(<1s) Ideal for development - syntax checking, linting, unit tests, local execution"
    fast: "(<10s) Acceptable for testing - integration tests, local DB queries, small file ops"
    moderate: "(<60s) Tolerable for validation - full test suites, medium datasets, building docs"
    slow: "(>60s) Requires justification + progress bars - large data, network ops, deployments"
  
  critical_rule: "Any operation >60s MUST show progress"

examples:
  - description: Script design for fast feedback
    good: "Log progress every 100 records. Incremental checkpoints. User sees immediate activity"
    bad: "Process 1000 records silently, print 'Done!' after 5 minutes. No output until end"
  
  - description: Development workflow
    good: "Edit → test locally → see result in 5s → iterate. 30s per iteration"
    bad: "Edit → commit → deploy → wait 5min. 15min per iteration. 30x slower"

anti_patterns:
  - symptom: "No output until completion"
    fix: "Log progress immediately. Show user operation started"
  
  - symptom: "Testing in production (deploy-to-test)"
    fix: "Slowest possible feedback loop. Test locally first"

changelog:
  - date: "2025-10-26"
    version: "1.0.0"
    changes: "Initial principle from velocity coding talk"
  - date: "2025-11-02"
    version: "1.0.0"
