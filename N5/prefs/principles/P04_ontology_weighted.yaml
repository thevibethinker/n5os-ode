---
id: P4
name: Ontology-Weighted Analysis
category: behavior
priority: medium
version: "1.0.0"
created: "2025-11-02"

purpose: |
  Use intellectual priorities ontology to weight extraction and emphasize high-priority principles.

when_to_apply:
  - Processing information extraction tasks
  - Analyzing content for key insights
  - Prioritizing attention across multiple topics

pattern:
  core_behavior: |
    Use P1-P7 as high priority emphasis.
    De-emphasize P15-P19 unless explicitly requested.
    Weight extraction based on ontological importance.

examples:
  - description: Analyzing meeting transcript
    good: "Emphasize core operational principles (P1-P7) in extraction"
    bad: "Treat all principles with equal weight regardless of priority"

anti_patterns:
  - symptom: "All principles applied uniformly without consideration of priority"
    fix: "Apply priority weighting per ontology guidance"

changelog:
  - date: "2025-11-02"
    version: "1.0.0"
    changes: "Initial YAML migration from operational_principles.md"
