name: Systemic Risk Scoring Framework
version: '1.0'
created: '2025-10-31'
purpose: Assess blast radius, dependencies, and reverberating impacts before operations
risk_dimensions:
  dependency_risk:
    description: How many files/systems reference this?
    scoring:
      0_references: 1
      1-5_references: 3
      6-15_references: 5
      16+_references: 8
      schema_file: 10
    detection:
    - grep -r for filename across workspace
    - Check N5/schemas/ for schema references
    - Check import statements in Python files
    - Check file mentions in markdown
  protection_risk:
    description: Is this protected or in protected path?
    scoring:
      has_n5protected: 10
      in_N5_prefs: 9
      in_N5_scripts: 8
      in_Knowledge: 7
      in_Prompts: 6
      user_workspace: 3
    detection:
    - Run n5_protect.py check
    - Check parent directory chain
  state_risk:
    description: Does this affect system state or active workflows?
    scoring:
      active_session_state: 9
      recipes_definitions: 8
      architectural_principles: 8
      persona_definition: 7
      workflow_in_progress: 6
      static_content: 2
    detection:
    - Check SESSION_STATE.md references
    - Check executables.db
    - Check if file in Knowledge/architectural/
    - Check if active persona references it
  reversibility_risk:
    description: How hard to undo if breaks?
    scoring:
      destructive_no_backup: 10
      schema_change: 8
      bulk_operation: 6
      single_file_tracked: 2
      single_file_new: 1
    detection:
    - Check if delete/overwrite operation
    - Check if affects >10 files
    - Check git status
    - Check if schema/structural change
  cross_persona_risk:
    description: How many personas use this?
    scoring:
      all_personas: 10
      3+_personas: 7
      1-2_personas: 4
      single_workflow: 2
    detection:
    - Check persona definitions for references
    - Check N5/prefs for shared dependencies
  recovery_cost:
    description: Time/effort to fix if breaks
    scoring:
      system_rebuild: 10
      multi_file_cascade: 8
      schema_repair: 7
      single_file_restore: 3
      git_revert: 1
    estimation:
    - 'Simple file move: 1'
    - 'Schema change: 7'
    - 'Multi-dependency break: 8'
    - 'Core system file corruption: 10'
composite_score:
  formula: weighted_average(dependency_risk, protection_risk, state_risk, reversibility_risk, cross_persona_risk, recovery_cost)
  weights:
    dependency_risk: 0.2
    protection_risk: 0.15
    state_risk: 0.2
    reversibility_risk: 0.25
    cross_persona_risk: 0.1
    recovery_cost: 0.1
  thresholds:
    low_risk:
    - 0
    - 3
    medium_risk:
    - 3.1
    - 6
    high_risk:
    - 6.1
    - 8
    critical_risk:
    - 8.1
    - 10
operator_behavior:
  low_risk:
    action: Execute directly
    example: Moving new file in user workspace
  medium_risk:
    action: Show dry-run, ask confirmation
    example: Bulk operation on 20 files
  high_risk:
    action: Show blast radius report, require explicit confirmation
    report_includes:
    - affected_files
    - dependencies
    - personas_impacted
    - recovery_plan
    example: Moving file referenced in 12 places
  critical_risk:
    action: Block and escalate
    escalation: Explain risk, recommend safer alternative, require multi-step confirmation
    example: Deleting schema file or protected system file
blast_radius_report_template:
  sections:
  - 'Operation: [describe what]'
  - 'Risk Score: X/10 ([threshold])'
  - 'Direct Impact: [files affected]'
  - 'Dependencies: [what references this]'
  - 'Personas Affected: [which personas use this]'
  - 'Reversibility: [how to undo]'
  - 'Recovery Cost: [time/effort if breaks]'
  - 'Recommendation: [proceed/modify/abort]'
examples:
  low_risk_operation:
    operation: Move /home/workspace/temp.txt to /home/workspace/Archive/temp.txt
    scores:
      dependency: 1
      protection: 3
      state: 2
      reversibility: 2
      cross_persona: 2
      recovery: 1
    composite: 1.85
    threshold: low_risk
    action: Execute directly
  high_risk_operation:
    operation: Modify N5/schemas/index.schema.json
    scores:
      dependency: 8
      protection: 9
      state: 8
      reversibility: 8
      cross_persona: 10
      recovery: 7
    composite: 8.25
    threshold: critical_risk
    action: Block and escalate with full blast radius report
implementation_notes:
  operator_integration: Operator calls risk_scorer.py before destructive ops
  script_location: N5/scripts/risk_scorer.py
  cache_strategy: Cache dependency maps (rebuild on file changes)
  performance: Fast path for obvious low-risk ops, deep scan for high-risk
