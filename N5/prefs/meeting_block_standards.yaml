---
# Meeting Block Quality Standards
# Defines minimum acceptable quality for meeting intelligence blocks
# Version: 1.0
# Created: 2025-11-04

core_blocks:
  mandatory:
    - B01  # Detailed Recap - Always required
    - B02  # Commitments - Always required
    - B05  # Questions - Always required
    - B26  # Metadata - Always required
  
  common:
    - B15  # Insights
    - B21  # Key Moments
    - B25  # Deliverables

folder_naming:
  pattern: "{date}_{participants}_{type}"
  date_format: "YYYY-MM-DD"
  max_length: 100
  allowed_chars: "a-zA-Z0-9_-"
  forbidden_patterns:
    - "^[a-z]{3}-[a-z]{4}-[a-z]{3}-"  # Fireflies codes
    - "transcript-\\d{4}-\\d{2}-\\d{2}T"  # Raw transcript timestamps

quality_standards:
  B01_detailed_recap:
    min_length: 2000  # characters
    required_sections:
      - Context
      - Discussion
      - Outcomes
    section_markers: ["##", "###", "**"]
    quality_checks:
      - "Must include meeting context"
      - "Must cover key discussion points"
      - "Must document outcomes"
  
  B02_commitments:
    min_items: 1
    required_format: "list"
    accepts_none: true  # Can explicitly state "No commitments"
    quality_checks:
      - "Each commitment has owner"
      - "Each commitment has action"
      - "No vague commitments (follow up, circle back)"
  
  B05_questions:
    min_items: 1
    required_format: "list"
    accepts_none: true  # Can explicitly state "No open questions"
    quality_checks:
      - "Questions are specific"
      - "Context provided for each question"
  
  B15_insights:
    min_length: 1500
    quality_checks:
      - "Insights are substantive"
      - "Not just summary repetition"
      - "Connected to broader context"
  
  B21_key_moments:
    min_items: 3
    format: "chronological"
    quality_checks:
      - "Moments are meaningful"
      - "Include context and significance"
      - "Not just transcript excerpts"
  
  B25_deliverables:
    min_items: 1
    accepts_none: true
    quality_checks:
      - "Each deliverable has owner"
      - "Each deliverable has deadline"
      - "Deliverables are specific"
  
  B26_metadata:
    min_length: 800
    required_sections:
      - "Basic Information"
      - "Participants"
      - "Meeting Context"
      - "Stakeholders"
    required_fields_in_basic:
      - "Meeting ID"
      - "Date"
      - "Meeting Type"
    stakeholder_requirements:
      - "Each external stakeholder must have: Full Name, Organization"
      - "If organization unknown, mark as '[Organization Unknown - needs research]'"
      - "Distinguish between internal team members and external stakeholders"
    quality_checks:
      - "Meeting ID present"
      - "Date formatted properly"
      - "Meeting type specified"
      - "At least 2 participants listed"
      - "Meeting context/purpose described"
      - "External stakeholders identified with organizations"

validation_thresholds:
  mandatory_blocks_pass_rate: 1.0  # 100% of mandatory blocks must pass
  overall_pass_rate: 0.75  # 75% of all generated blocks must pass
  max_retry_attempts: 3
  
retry_strategy:
  attempt_1: "Regenerate with explicit quality feedback"
  attempt_2: "Regenerate with stricter instructions"
  attempt_3: "Flag for human review"

block_naming:
  pattern: "^B\\d{2}_[a-z_]+\\.md$"
  examples:
    - "B01_detailed_recap.md"
    - "B02_commitments.md"
    - "B05_questions.md"
  forbidden:
    - "notes.md"
    - "deliverables.md"
    - "follow_up.md"
    - "key_quotes.md"

# Updated: 2025-11-04 — Initial standards definition
