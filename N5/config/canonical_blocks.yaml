    - "B08: 4 different meanings → standardized to FOLLOW_UP_CONVERSATIONS"
    - "B09: 2 different meanings → standardized to REFERENCE_DATA"
    - "B10: 2 different meanings → standardized to CONTEXT_CONNECTIONS + RISK_REGISTER"
  
  blocks_preserved:
    count: 20
