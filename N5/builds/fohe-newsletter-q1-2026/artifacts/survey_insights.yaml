insights_for_newsletter:
  - "Members are most excited about **panels** (66% want more) and **AI adoption in education** (41 mentions) - clearly the hottest topic of 2026"
  - "The #1 request is better **work-life integration** - many want daytime events and virtual options to balance busy schedules"
  - "**44% of our active volunteers** want to be Neighborhood Ambassadors, showing strong desire for local, intimate connections beyond big events"
  - "Interestingly, **64% work in Edtech** but there's growing appetite for **workforce development** and **adult education** discussions"
  - "**Geographic spread is real** - we're not just Manhattan-centric anymore with 34% from Brooklyn, NJ, and outer boroughs"
  - "The **solopreneur program** is generating genuine excitement and requests for more collaborative, hands-on formats like hackathons"
  - "**Slack fatigue is real** - people want email newsletters (42 responses) as much as Slack notifications (40 responses)"

surprising_findings:
  - "More people want casual outings (44%) than conference happy hours (39%) - community over industry networking"
  - "Adult Education (24 mentions) tied with Founding & Scaling (24) as hot topics - lifelong learning is having a moment"
  - "New Jersey contingent is as large as Brooklyn's (10 each) - we're truly a tri-state community"
  - "Neighborhood Ambassador role got 65% more interest than Event Greeter - people want ongoing relationship-building, not just event help"