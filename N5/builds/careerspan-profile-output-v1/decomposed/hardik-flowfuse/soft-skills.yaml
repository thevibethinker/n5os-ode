    - "No explicit examples of async decision-making"
    - "No RFC or technical writing samples"
  careerspan_assessment: "Likely strong communicator based on leadership success; async-specific habits unknown"

adaptability:
  level: "Strong"
  evidence:
    - "Moved from enterprise (AmEx) to founding role (Keysight)"
    - "Handled ambiguity of greenfield development"
    - "Learned and applied new technologies as needed"
