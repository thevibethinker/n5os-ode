collaboration:
  level: "Strong"
  evidence:
    - "Cross-functional work with enterprise clients (Apple, Samsung, Volkswagen)"
    - "Stakeholder management across engineering and business"
  gaps:
    - "Async-first collaboration artifacts not explicitly shown"
    - "Written communication samples (RFCs, technical docs) not provided"
