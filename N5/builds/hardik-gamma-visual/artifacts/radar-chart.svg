<svg width="280" height="240" viewBox="0 0 280 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .axis-line { stroke: #e2e8f0; stroke-width: 1; fill: none; }
      .axis-label { font-family: Arial, sans-serif; font-size: 9px; fill: #4a5568; }
      .data-area { fill: rgba(232, 212, 248, 0.5); stroke: #1E1E3F; stroke-width: 2; }
      .data-point { fill: #1E1E3F; }
      .score-label { font-family: Arial, sans-serif; font-size: 8px; fill: #1E1E3F; font-weight: bold; }
      .title { font-family: Arial, sans-serif; font-size: 11px; fill: #1E1E3F; font-weight: bold; }
    </style>
  </defs>
  
  <!-- Title -->
  <text x="140" y="18" text-anchor="middle" class="title">Candidate Fit Profile</text>
  
  <!-- Center point -->
  <g transform="translate(140, 130)">
    <!-- Grid circles (20%, 40%, 60%, 80%, 100%) -->
    <polygon points="0,-18 17,-6 11,15 -11,15 -17,-6" class="axis-line"/>
    <polygon points="0,-36 34,-11 21,29 -21,29 -34,-11" class="axis-line"/>
    <polygon points="0,-54 51,-17 32,44 -32,44 -51,-17" class="axis-line"/>
    <polygon points="0,-72 69,-22 43,58 -43,58 -69,-22" class="axis-line"/>
    <polygon points="0,-90 86,-28 53,73 -53,73 -86,-28" class="axis-line"/>
    
    <!-- Axis lines -->
    <line x1="0" y1="0" x2="0" y2="-90" class="axis-line"/>
    <line x1="0" y1="0" x2="86" y2="-28" class="axis-line"/>
    <line x1="0" y1="0" x2="53" y2="73" class="axis-line"/>
    <line x1="0" y1="0" x2="-53" y2="73" class="axis-line"/>
    <line x1="0" y1="0" x2="-86" y2="-28" class="axis-line"/>
    
    <!-- Data polygon: Background 96, Hard Skills 80, Responsibilities 90, Soft Skills 94, Uniqueness 93 -->
    <!-- Scaled: 96*0.9=86.4, 80*0.9=72, 90*0.9=81, 94*0.9=84.6, 93*0.9=83.7 -->
    <!-- Points calculated for 5-point radar -->
    <polygon points="0,-86 69,-20 48,66 -50,68 -80,-26" class="data-area"/>
    
    <!-- Data points -->
    <circle cx="0" cy="-86" r="4" class="data-point"/>
    <circle cx="69" cy="-20" r="4" class="data-point"/>
    <circle cx="48" cy="66" r="4" class="data-point"/>
    <circle cx="-50" cy="68" r="4" class="data-point"/>
    <circle cx="-80" cy="-26" r="4" class="data-point"/>
    
    <!-- Labels -->
    <text x="0" y="-98" text-anchor="middle" class="axis-label">Background</text>
    <text x="0" y="-108" text-anchor="middle" class="score-label">96</text>
    
    <text x="98" y="-28" text-anchor="start" class="axis-label">Hard Skills</text>
    <text x="98" y="-16" text-anchor="start" class="score-label">80</text>
    
    <text x="63" y="88" text-anchor="middle" class="axis-label">Responsibilities</text>
    <text x="63" y="100" text-anchor="middle" class="score-label">90</text>
    
    <text x="-63" y="88" text-anchor="middle" class="axis-label">Soft Skills</text>
    <text x="-63" y="100" text-anchor="middle" class="score-label">94</text>
    
    <text x="-98" y="-28" text-anchor="end" class="axis-label">Uniqueness</text>
    <text x="-98" y="-16" text-anchor="end" class="score-label">93</text>
  </g>
  
  <!-- Overall score -->
  <text x="140" y="232" text-anchor="middle" style="font-family: Arial; font-size: 10px; fill: #4a5568;">Overall: 89/100 • Well-aligned</text>
</svg>
